<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --glitch-cyan: #00f2ff;
            --glitch-magenta: #ff00c1;
            --scanline-color: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- SCANLINE EFFECT --- */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--scanline-color);
            z-index: 10;
            pointer-events: none;
            animation: scanline 4s linear infinite;
        }

        @keyframes scanline {
            0% { top: -5%; }
            100% { top: 105%; }
        }

        .container { text-align: center; z-index: 5; }

        /* --- INDIVIDUAL LETTER GLITCH --- */
        .glitch-text {
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            cursor: crosshair;
            display: flex;
            gap: 0.05em;
        }

        .char {
            position: relative;
            display: inline-block;
        }

        /* Glitch layers for each character */
        .char::before, .char::after {
            content: attr(data-char);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
            display: none;
        }

        .char:hover::before {
            display: block;
            left: 3px;
            text-shadow: -2px 0 var(--glitch-cyan);
            animation: glitch-anim 0.3s infinite linear alternate-reverse;
        }

        .char:hover::after {
            display: block;
            left: -3px;
            text-shadow: 2px 0 var(--glitch-magenta);
            animation: glitch-anim-2 0.2s infinite linear alternate;
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(20% 0 50% 0); }
            20% { clip-path: inset(80% 0 10% 0); }
            40% { clip-path: inset(40% 0 40% 0); }
            60% { clip-path: inset(10% 0 70% 0); }
            80% { clip-path: inset(50% 0 20% 0); }
            100% { clip-path: inset(30% 0 60% 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 80% 0); }
            50% { clip-path: inset(60% 0 10% 0); }
            100% { clip-path: inset(40% 0 30% 0); }
        }

        /* --- THE BUTTON --- */
        .button-wrapper { margin-top: 4rem; }

        .n8n-link {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 900;
            font-size: 0.8rem;
            letter-spacing: 0.5em;
            padding: 14px 45px;
            border: 1px solid var(--text-color);
            transition: all 0.3s ease;
            position: relative;
        }

        .n8n-link:hover {
            background: var(--text-color);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            transform: scale(1.05);
        }

        /* Background Grid */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-text" id="glitch-container">
            </div>
        <div class="button-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
        </div>
    </div>

    <script>
        const text = "K TO THE K";
        const container = document.getElementById('glitch-container');

        // Break text into individual spans for letter-by-letter control
        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char';
            span.innerText = char === ' ' ? '\u00A0' : char; // Handle spaces
            span.setAttribute('data-char', char);
            container.appendChild(span);
        });
    </script>
</body>
</html>
