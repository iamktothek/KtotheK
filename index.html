<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        :root {
            --accent: #ffffff;
            --bg: #050505;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            outline: none;
            z-index: 1;
        }

        .ui-overlay {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* The Button */
        .n8n-button {
            margin-top: 120px; /* Space for the 3D text */
            pointer-events: auto;
            padding: 14px 36px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 12px;
            font-weight: 600;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(10px);
        }

        .n8n-button:hover {
            background: white;
            color: black;
            letter-spacing: 0.5em;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        /* Hint for the user */
        .hint {
            position: absolute;
            bottom: 30px;
            opacity: 0.3;
            font-size: 10px;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-overlay">
        <a href="https://n8n.ktothek.com" class="n8n-button">N8N</a>
        <div class="hint">INTERACT WITH THE CORE</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        let scene, camera, renderer, particles, mouse = new THREE.Vector2();
        let targetRotation = new THREE.Vector2();

        init();

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 2. Load Font & Create Particle Text
            const loader = new FontLoader();
            // Using a standard Three.js JSON font
            loader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                const geometry = new TextGeometry('K to the K', {
                    font: font,
                    size: 8,
                    height: 2,
                    curveSegments: 12,
                    bevelEnabled: false
                });

                geometry.center();

                // Convert geometry to points
                const count = 8000;
                const positions = new Float32Array(count * 3);
                const originalPositions = new Float32Array(count * 3);
                
                // Sample points from the text surface
                const sampler = geometry.getAttribute('position').array;
                for (let i = 0; i < count; i++) {
                    const i3 = i * 3;
                    const randomIdx = Math.floor(Math.random() * (sampler.length / 3)) * 3;
                    
                    positions[i3] = sampler[randomIdx];
                    positions[i3 + 1] = sampler[randomIdx + 1];
                    positions[i3 + 2] = sampler[randomIdx + 2];
                    
                    originalPositions[i3] = positions[i3];
                    originalPositions[i3 + 1] = positions[i3 + 1];
                    originalPositions[i3 + 2] = positions[i3 + 2];
                }

                const pointGeo = new THREE.BufferGeometry();
                pointGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                pointGeo.setAttribute('original', new THREE.BufferAttribute(originalPositions, 3));

                const material = new THREE.PointsMaterial({
                    color: 0xffffff,
                    size: 0.15,
                    transparent: true,
                    opacity: 0.8,
                    blending: THREE.AdditiveBlending
                });

                particles = new THREE.Points(pointGeo, material);
                scene.add(particles);
                animate();
            });

            // 3. Listeners
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                targetRotation.x = mouse.y * 0.2;
                targetRotation.y = mouse.x * 0.2;
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (particles) {
                // Gentle floating motion
                particles.rotation.x += (targetRotation.x - particles.rotation.x) * 0.05;
                particles.rotation.y += (targetRotation.y - particles.rotation.y) * 0.05;

                const positions = particles.geometry.attributes.position.array;
                const originals = particles.geometry.attributes.original.array;
                const time = Date.now() * 0.001;

                for (let i = 0; i < positions.length / 3; i++) {
                    const i3 = i * 3;
                    
                    // Add some organic "breathing" noise
                    positions[i3] = originals[i3] + Math.sin(time + originals[i3]) * 0.2;
                    positions[i3 + 1] = originals[i3 + 1] + Math.cos(time + originals[i3 + 1]) * 0.2;
                }
                particles.geometry.attributes.position.needsUpdate = true;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
