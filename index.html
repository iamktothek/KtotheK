<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K to the K</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
}

body{
height:100vh;
background:#050510;
font-family:'Orbitron',sans-serif;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.container{
position:relative;
z-index:2;
text-align:center;
}

.title{

font-size:clamp(3rem,8vw,6rem);
letter-spacing:.25em;

background:linear-gradient(90deg,#00f2ff,#ff00ea,#00f2ff);
background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
glowPulse 3s ease-in-out infinite,
gradientMove 6s linear infinite;

}

.divider{
width:160px;
height:2px;
margin:30px auto;
background:linear-gradient(90deg,transparent,#00eaff,transparent);
box-shadow:0 0 10px #00eaff;
}

.button{

display:inline-block;
padding:16px 42px;
font-size:1.2rem;
letter-spacing:.25em;

color:#00eaff;
text-decoration:none;

border:2px solid #00eaff;
border-radius:8px;

animation:glowPulse 3s ease-in-out infinite;

}

.button:hover{

box-shadow:
0 0 10px #00eaff,
0 0 30px #ff00f7,
0 0 60px #ff00f7;

color:white;

}

@keyframes glowPulse{

0%,100%{

text-shadow:
0 0 10px #00eaff,
0 0 20px #ff00f7;

box-shadow:
0 0 10px #00eaff,
0 0 20px #ff00f7;

}

50%{

text-shadow:
0 0 20px #00eaff,
0 0 40px #ff00f7;

box-shadow:
0 0 20px #00eaff,
0 0 40px #ff00f7;

}

}

@keyframes gradientMove{
0%{background-position:0%}
100%{background-position:200%}
}

</style>

</head>

<body>

<div class="container">

<div class="title">K to the K</div>

<div class="divider"></div>

<a class="button" href="https://n8n.ktothek.com">N8N</a>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 5

let renderer = new THREE.WebGLRenderer({alpha:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

let particles = 1500

let geometry = new THREE.BufferGeometry()

let positions = new Float32Array(particles*3)

for(let i=0;i<particles*3;i++){

positions[i]=(Math.random()-0.5)*20

}

geometry.setAttribute(
'position',
new THREE.BufferAttribute(positions,3)
)

let material = new THREE.PointsMaterial({

color:0x00eaff,
size:0.05

})

let particleSystem = new THREE.Points(geometry,material)

scene.add(particleSystem)

let mouse={x:0,y:0}

window.addEventListener('mousemove',(e)=>{

mouse.x=(e.clientX/window.innerWidth-0.5)*2
mouse.y=(e.clientY/window.innerHeight-0.5)*2

})

window.addEventListener('touchmove',(e)=>{

mouse.x=(e.touches[0].clientX/window.innerWidth-0.5)*2
mouse.y=(e.touches[0].clientY/window.innerHeight-0.5)*2

})

function animate(){

requestAnimationFrame(animate)

particleSystem.rotation.x +=0.0005
particleSystem.rotation.y +=0.001

particleSystem.rotation.x += mouse.y*0.002
particleSystem.rotation.y += mouse.x*0.002

renderer.render(scene,camera)

}

animate()

window.addEventListener('resize',()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
