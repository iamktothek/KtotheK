<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f7f9;
            --text-color: #000000;
            --glitch-cyan: #00f2ff;
            --glitch-magenta: #ff00c1;
            --vcr-green: #2aff2a;
        }

        /* --- THE MECHANICAL SHUTTER --- */
        #loader-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; display: flex; flex-direction: column;
            pointer-events: none; overflow: hidden;
        }
        .shutter {
            flex: 1; background: #000; width: 100%; position: relative;
            transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .shutter::after {
            content: ""; position: absolute; left: 0; width: 100%; height: 2px;
            background: #fff; box-shadow: 0 0 15px #fff; opacity: 0;
        }
        #shutter-top::after { bottom: 0; }
        #shutter-bottom::after { top: 0; }
        .power-on .shutter::after { opacity: 1; transition: opacity 0.1s; }
        .loaded #shutter-top { transform: translateY(-100%); }
        .loaded #shutter-bottom { transform: translateY(100%); }

        /* --- VHS EFFECTS --- */
        .vhs-grain {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            z-index: 50; pointer-events: none;
            background-image: repeating-radial-gradient(#000 0 0.0001%, #fff 0 0.0002%);
            background-size: 100px 100px; opacity: 0.05;
            animation: grain-flicker 0.15s steps(2) infinite;
        }
        @keyframes grain-flicker {
            0% { transform: translate(0,0); }
            100% { transform: translate(5px,5px); }
        }

        /* --- VCR STATUS OVERLAY --- */
        #vcr-status {
            position: fixed; top: 40px; left: 50px;
            color: var(--vcr-green); font-family: monospace;
            font-size: 1.5rem; text-transform: uppercase;
            z-index: 60; opacity: 0.8; letter-spacing: 2px;
            text-shadow: 2px 0 0 rgba(255,0,0,0.5);
            animation: vcr-blink 1s steps(2) infinite;
        }
        @keyframes vcr-blink { 0% { opacity: 0.8; } 50% { opacity: 0.2; } }

        /* --- GLOBAL LAYOUT --- */
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Inter', sans-serif; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative; margin: 0;
        }
        .container { text-align: center; z-index: 5; }

        /* --- TYPOGRAPHY & FIXED GLITCH --- */
        .glitch-text {
            font-weight: 900; text-transform: uppercase;
            display: flex; justify-content: center; align-items: center;
            gap: 0.05em; user-select: none;
            filter: drop-shadow(2px 0 0px rgba(0, 242, 255, 0.2)) 
                    drop-shadow(-2px 0 0px rgba(255, 0, 193, 0.2));
        }
        .char { 
            position: relative; 
            display: inline-block; 
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 1;
        }
        .char.big-k { font-size: clamp(6rem, 20vw, 16rem); }

        /* Glitch Layers */
        .char::before, .char::after {
            content: attr(data-char);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-color); /* Prevents "see-through" glitching */
            visibility: hidden;
        }
        
        /* Cyan Layer */
        .char.active::before {
            visibility: visible;
            left: 3px;
            color: var(--glitch-cyan);
            z-index: -1;
            animation: glitch-anim 0.2s infinite;
        }
        /* Magenta Layer */
        .char.active::after {
            visibility: visible;
            left: -3px;
            color: var(--glitch-magenta);
            z-index: -2;
            animation: glitch-anim-2 0.2s infinite linear;
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(-2px, 2px); }
            50% { clip-path: inset(30% 0 20% 0); transform: translate(2px, -1px); }
            100% { clip-path: inset(40% 0 40% 0); transform: translate(-1px, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(50% 0 10% 0); transform: translate(2px, -2px); }
            50% { clip-path: inset(10% 0 70% 0); transform: translate(-2px, 1px); }
            100% { clip-path: inset(30% 0 30% 0); transform: translate(1px, 0); }
        }

        /* --- BUTTON --- */
        .button-wrapper { margin-top: 4rem; }
        .n8n-link {
            display: inline-block; text-decoration: none;
            color: var(--text-color); font-weight: 900; font-size: 0.85rem;
            letter-spacing: 0.4em; padding: 22px 65px; border: 3px solid var(--text-color);
            background: var(--bg-color); transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .n8n-link:hover { 
            background: var(--text-color); 
            color: var(--bg-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }
    </style>
</head>
<body>

    <div id="vcr-status">PLAY ▶<br>00:00:01</div>

    <div id="loader-wrapper">
        <div class="shutter" id="shutter-top"></div>
        <div class="shutter" id="shutter-bottom"></div>
    </div>

    <div class="vhs-grain"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-text" id="glitch-container"></div>
        <div class="button-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
        </div>
    </div>

    <script>
        const text = "K TO THE K";
        const glitchContainer = document.getElementById('glitch-container');
        const chars = [];

        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char';
            if (char.toUpperCase() === 'K') span.classList.add('big-k');
            
            // Fix for space characters
            const displayChar = char === ' ' ? '\u00A0' : char;
            span.innerText = displayChar;
            span.setAttribute('data-char', displayChar);
            
            glitchContainer.appendChild(span);
            chars.push(span);
        });

        function triggerGlitchCascade() {
            chars.forEach((char, i) => {
                // Random delays create a more "organic" digital glitch feel
                setTimeout(() => {
                    char.classList.add('active');
                    setTimeout(() => char.classList.remove('active'), 150 + Math.random() * 100);
                }, i * 60);
            });
        }

        window.addEventListener('load', () => {
            document.body.classList.add('power-on');
            setTimeout(() => {
                document.getElementById('loader-wrapper').classList.add('loaded');
                // Pulse the glitch every 3 seconds
                setInterval(triggerGlitchCascade, 3000);
            }, 800);
        });
    </script>
</body>
</html>
