<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #ffffff; 
            cursor: default;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, points;
        let mouse = new THREE.Vector2(-1, -1);
        let targetRotation = new THREE.Vector2(0, 0);
        let isOverButton = false;
        
        const particleCount = 6000; 
        const positions = new Float32Array(particleCount * 3);
        const targets = new Float32Array(particleCount * 3);
        const isButton = new Uint8Array(particleCount); 

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Random initial scatter
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 40;
                positions[i*3+1] = (Math.random() - 0.5) * 40;
                positions[i*3+2] = (Math.random() - 0.5) * 10;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                size: 0.1,
                color: 0x000000,
                transparent: true,
                opacity: 0.8
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            createCoordinates();

            // Assemble
            gsap.to(positions, {
                endArray: targets,
                duration: 3,
                ease: "power3.out",
                onUpdate: () => { points.geometry.attributes.position.needsUpdate = true; }
            });

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                targetRotation.x = -mouse.y * 0.3;
                targetRotation.y = mouse.x * 0.3;

                // Simple Box Check for N8N (lower center)
                const over = (mouse.y < -0.15 && mouse.y > -0.6 && Math.abs(mouse.x) < 0.25);
                if (over !== isOverButton) {
                    isOverButton = over;
                    document.body.style.cursor = isOverButton ? 'pointer' : 'default';
                }
            });

            window.addEventListener('click', () => {
                if (isOverButton) window.location.href = "https://n8n.ktothek.com";
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function createCoordinates() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1000;
            canvas.height = 500;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Title
            ctx.fillStyle = 'black';
            ctx.font = 'bold 100px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("K TO THE K", 500, 200);

            // Button Box
            ctx.fillRect(350, 320, 300, 100);

            // Button Text
            ctx.fillStyle = 'white';
            ctx.font = 'bold 50px sans-serif';
            ctx.fillText("N8N", 500, 385);

            const data = ctx.getImageData(0, 0, 1000, 500).data;
            const pts = [];

            for (let y = 0; y < 500; y += 4) {
                for (let x = 0; x < 1000; x += 4) {
                    const i = (y * 1000 + x) * 4;
                    if (data[i] < 200) {
                        pts.push({
                            x: (x - 500) * 0.015,
                            y: (250 - y) * 0.015,
                            btn: (y > 280)
                        });
                    }
                }
            }

            for (let i = 0; i < particleCount; i++) {
                const p = pts[i % pts.length];
                targets[i*3] = p.x;
                targets[i*3+1] = p.y;
                targets[i*3+2] = 0;
                isButton[i] = p.btn ? 1 : 0;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Apply slight tilt
            points.rotation.x += (targetRotation.x - points.rotation.x) * 0.05;
            points.rotation.y += (targetRotation.y - points.rotation.y) * 0.05;

            const pos = points.geometry.attributes.position.array;
            
            // Interaction Point (Adjusted for camera Z and rotation)
            const mx = mouse.x * 8; 
            const my = mouse.y * 5;

            for (let i = 0; i < particleCount; i++) {
                let tx = targets[i*3];
                let ty = targets[i*3+1];
                let tz = targets[i*3+2];

                if (isButton[i] === 0) {
                    // Repulsion Logic for Title
                    const dx = pos[i*3] - mx;
                    const dy = pos[i*3+1] - my;
                    const distSq = dx*dx + dy*dy;
                    if (distSq < 2.0) {
                        const dist = Math.sqrt(distSq);
                        const force = (2.0 - dist) / 2.0;
                        tx += (dx/dist) * force * 3;
                        ty += (dy/dist) * force * 3;
                    }
                } else if (isOverButton) {
                    // Glitch Logic for Button
                    tx += (Math.random() - 0.5) * 0.3;
                    ty += (Math.random() - 0.5) * 0.3;
                }

                // Spring movement
                pos[i*3] += (tx - pos[i*3]) * 0.1;
                pos[i*3+1] += (ty - pos[i*3+1]) * 0.1;
                pos[i*3+2] += (tz - pos[i*3+2]) * 0.1;
            }

            points.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
