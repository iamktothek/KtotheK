<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #ff3e00; /* Subtle Swiss Red accent */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            cursor: default;
        }

        h1 {
            font-weight: 900;
            font-size: clamp(3rem, 15vw, 10rem);
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* The Interactive Hover */
        h1:hover {
            letter-spacing: 0.05em;
            font-style: italic;
        }

        .button-wrapper {
            margin-top: 2rem;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 0.5s;
        }

        .n8n-link {
            display: inline-block;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 400;
            font-size: 1.2rem;
            letter-spacing: 0.2rem;
            padding: 10px 30px;
            border: 1px solid var(--text-color);
            position: relative;
            transition: all 0.3s ease;
        }

        .n8n-link:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
            transform: translateY(-5px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtle Swiss Grid Lines (Optional Decor) */
        .grid-line {
            position: fixed;
            background: rgba(0,0,0,0.05);
            z-index: -1;
        }
        .v-line { width: 1px; height: 100%; top: 0; }
        .h-line { height: 1px; width: 100%; left: 0; }
    </style>
</head>
<body>

    <div class="grid-line v-line" style="left: 20%;"></div>
    <div class="grid-line v-line" style="left: 80%;"></div>

    <div class="container">
        <h1 id="title">K TO THE K</h1>
        <div class="button-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
        </div>
    </div>

    <script>
        // Simple tilt effect for ultra-modern feel
        const title = document.getElementById('title');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            title.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });
    </script>
</body>
</html>
