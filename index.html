<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K to the K</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
}

body{
height:100vh;
background:#050510;
font-family:'Orbitron',sans-serif;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:1;
}

.container{

position:relative;
z-index:5;
text-align:center;

padding:60px 80px;

background:rgba(10,10,30,0.35);
backdrop-filter:blur(18px);

border-radius:20px;

box-shadow:
0 0 50px rgba(0,234,255,0.25),
0 0 120px rgba(255,0,247,0.25);

}

.title{

font-size:clamp(3rem,8vw,6rem);
letter-spacing:.25em;

background:linear-gradient(90deg,#00f2ff,#ff00ea,#00f2ff);
background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
glowPulse 3s ease-in-out infinite,
gradientMove 6s linear infinite;

}

.divider{
width:160px;
height:2px;
margin:30px auto;
background:linear-gradient(90deg,transparent,#00eaff,transparent);
box-shadow:0 0 10px #00eaff;
}

.button{

display:inline-block;
padding:16px 42px;
font-size:1.2rem;
letter-spacing:.25em;

color:#00eaff;
text-decoration:none;

border:2px solid #00eaff;
border-radius:8px;

animation:glowPulse 3s ease-in-out infinite;

}

.button:hover{

box-shadow:
0 0 15px #00eaff,
0 0 40px #ff00f7,
0 0 80px #ff00f7;

color:white;

}

@keyframes glowPulse{

0%,100%{

text-shadow:
0 0 10px #00eaff,
0 0 20px #ff00f7;

box-shadow:
0 0 10px #00eaff,
0 0 20px #ff00f7;

}

50%{

text-shadow:
0 0 20px #00eaff,
0 0 40px #ff00f7;

box-shadow:
0 0 20px #00eaff,
0 0 40px #ff00f7;

}

}

@keyframes gradientMove{
0%{background-position:0%}
100%{background-position:200%}
}

</style>

</head>

<body>

<div class="container">

<div class="title">K to the K</div>

<div class="divider"></div>

<a class="button" href="https://n8n.ktothek.com">N8N</a>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 15

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setPixelRatio(window.devicePixelRatio)
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setClearColor(0x050510)

document.body.appendChild(renderer.domElement)

/* particle system */

const particleCount = 800

const geometry = new THREE.BufferGeometry()

const positions = new Float32Array(particleCount*3)
const velocities = []

for(let i=0;i<particleCount;i++){

positions[i*3]=(Math.random()-0.5)*20
positions[i*3+1]=(Math.random()-0.5)*20
positions[i*3+2]=(Math.random()-0.5)*20

velocities.push(
(Math.random()-0.5)*0.02,
(Math.random()-0.5)*0.02,
(Math.random()-0.5)*0.02
)

}

geometry.setAttribute(
'position',
new THREE.BufferAttribute(positions,3)
)

/* round particle texture */

const canvas = document.createElement("canvas")
canvas.width = 64
canvas.height = 64
const ctx = canvas.getContext("2d")

const gradient = ctx.createRadialGradient(32,32,4,32,32,32)
gradient.addColorStop(0,"#ffffff")
gradient.addColorStop(0.3,"#00eaff")
gradient.addColorStop(0.7,"#ff00f7")
gradient.addColorStop(1,"transparent")

ctx.fillStyle = gradient
ctx.fillRect(0,0,64,64)

const texture = new THREE.CanvasTexture(canvas)

const material = new THREE.PointsMaterial({
size:0.25,
map:texture,
transparent:true,
depthWrite:false,
blending:THREE.AdditiveBlending
})

const particles = new THREE.Points(geometry,material)

scene.add(particles)

/* cyberpunk grid */

const grid = new THREE.GridHelper(200,80,0xff00f7,0x00eaff)
grid.position.y = -8
scene.add(grid)

/* pointer interaction */

let mouseX=0
let mouseY=0

function updatePointer(x,y){

mouseX=(x/window.innerWidth-0.5)*2
mouseY=(y/window.innerHeight-0.5)*2

}

window.addEventListener("mousemove",e=>{
updatePointer(e.clientX,e.clientY)
})

window.addEventListener("touchmove",e=>{
updatePointer(e.touches[0].clientX,e.touches[0].clientY)
})

/* gyroscope */

window.addEventListener("deviceorientation",e=>{

mouseX = e.gamma/30
mouseY = e.beta/60

})

/* shockwave */

let shockwave=0

window.addEventListener("click",()=>{
shockwave=2
})

function animate(){

requestAnimationFrame(animate)

const pos = geometry.attributes.position.array

for(let i=0;i<particleCount;i++){

pos[i*3]+=velocities[i*3]
pos[i*3+1]+=velocities[i*3+1]
pos[i*3+2]+=velocities[i*3+2]

}

geometry.attributes.position.needsUpdate = true

particles.rotation.y +=0.0007 + mouseX*0.004
particles.rotation.x +=0.0004 + mouseY*0.004

if(shockwave>0){

particles.scale.set(
1+shockwave,
1+shockwave,
1+shockwave
)

shockwave*=0.9

}else{

particles.scale.set(1,1,1)

}

renderer.render(scene,camera)

}

animate()

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
