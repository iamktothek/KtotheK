<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --glitch-cyan: #00f2ff;
            --glitch-magenta: #ff00c1;
            --scanline-color: rgba(0, 0, 0, 0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* --- SCANLINE EFFECT --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: var(--scanline-color);
            z-index: 10;
            pointer-events: none;
            animation: scanline 6s linear infinite;
        }

        @keyframes scanline {
            0% { top: -5%; }
            100% { top: 105%; }
        }

        .container { text-align: center; z-index: 5; }

        /* --- INDIVIDUAL LETTER GLITCH --- */
        .glitch-text {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            display: flex;
            justify-content: center;
            align-items: center; /* Ensures K's align with smaller text */
            gap: 0.1em;
            user-select: none;
        }

        .char { 
            position: relative; 
            display: inline-block;
            font-size: clamp(3rem, 10vw, 8rem);
            transition: transform 0.2s ease;
        }

        /* Making the 'K' characters twice as large */
        .char.big-k {
            font-size: clamp(6rem, 20vw, 16rem);
            line-height: 0.8;
        }

        .char::before, .char::after {
            content: attr(data-char);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: none;
        }

        .char:hover::before {
            display: block;
            left: 4px;
            text-shadow: -3px 0 var(--glitch-cyan);
            animation: glitch-anim 0.3s infinite linear alternate-reverse;
            z-index: -1;
        }

        .char:hover::after {
            display: block;
            left: -4px;
            text-shadow: 3px 0 var(--glitch-magenta);
            animation: glitch-anim-2 0.2s infinite linear alternate;
            z-index: -2;
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(10% 0 60% 0); }
            100% { clip-path: inset(40% 0 20% 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(30% 0 30% 0); }
            100% { clip-path: inset(10% 0 70% 0); }
        }

        /* --- THE EXPANDING & CLICKABLE BUTTON --- */
        .button-wrapper { margin-top: 5rem; }

        .n8n-link {
            display: inline-block;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 0.4em;
            padding: 16px 50px;
            border: 2px solid var(--text-color);
            background: transparent;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            outline: none;
        }

        .n8n-link:hover {
            background: var(--text-color);
            color: var(--bg-color);
            transform: scale(1.15);
            letter-spacing: 0.6em;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        /* The Click Animation */
        .n8n-link:active {
            transform: scale(0.95); /* Shrinks slightly on press */
            background: #111;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            transition: all 0.1s ease; /* Fast response for click */
        }

        /* Background Grid Dots */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-text" id="glitch-container"></div>
        <div class="button-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
        </div>
    </div>

    <script>
        const text = "K TO THE K";
        const container = document.getElementById('glitch-container');

        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char';
            
            // Check if character is a 'K' to apply larger sizing
            if (char.toUpperCase() === 'K') {
                span.classList.add('big-k');
            }

            span.innerText = char === ' ' ? '\u00A0' : char;
            span.setAttribute('data-char', char);
            container.appendChild(span);
        });
    </script>
</body>
</html>
