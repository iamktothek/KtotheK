<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f7f9;
            --text-color: #000000;
            --glitch-cyan: #00f2ff;
            --glitch-magenta: #ff00c1;
            --scanline-color: rgba(0, 0, 0, 0.18);
        }

        /* --- PRELOADER (3s) --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            align-items: center; justify-content: center;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .loader-line {
            width: 0%; height: 2px;
            background: var(--text-color);
            animation: loadProgress 3s ease-in-out forwards;
        }
        @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }
        .loaded #loader { transform: translateY(-100%); }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
            opacity: 0; transition: opacity 1s ease;
        }
        body.loaded { opacity: 1; }

        /* --- SCANLINE --- */
        #scanline {
            position: absolute;
            top: -10px; left: 0; width: 100%; height: 12px;
            background: var(--scanline-color);
            z-index: 20; pointer-events: none;
        }

        .container { text-align: center; z-index: 5; }

        /* --- TYPOGRAPHY --- */
        .glitch-text {
            font-weight: 900; text-transform: uppercase;
            letter-spacing: -0.02em; display: flex;
            justify-content: center; align-items: center;
            gap: 0.1em; user-select: none;
        }
        .char { position: relative; display: inline-block; font-size: clamp(3rem, 10vw, 8rem); }
        .char.big-k { font-size: clamp(6rem, 20vw, 16rem); line-height: 0.8; }

        /* --- HIGH-SPEED GLITCH ANIMATIONS --- */
        .char::before, .char::after {
            content: attr(data-char);
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            visibility: hidden; background: transparent;
        }

        .char.active::before, .char:hover::before {
            visibility: visible; left: 6px;
            color: var(--glitch-cyan); z-index: -1;
            /* High Speed: 0.08s */
            animation: glitch-anim 0.08s infinite linear alternate-reverse;
            animation-delay: var(--g-delay);
        }

        .char.active::after, .char:hover::after {
            visibility: visible; left: -6px;
            color: var(--glitch-magenta); z-index: -2;
            /* High Speed: 0.05s */
            animation: glitch-anim-2 0.05s infinite linear alternate;
            animation-delay: calc(var(--g-delay) * 0.5);
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(-4px, 2px); }
            50% { clip-path: inset(30% 0 20% 0); transform: translate(4px, -1px); }
            100% { clip-path: inset(50% 0 10% 0); transform: translate(-2px, 3px); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(40% 0 30% 0); transform: translate(4px, 1px); }
            50% { clip-path: inset(10% 0 70% 0); transform: translate(-3px, -2px); }
            100% { clip-path: inset(60% 0 5% 0); transform: translate(2px, 2px); }
        }

        /* --- BUTTON WRAPPER GLITCH --- */
        .button-wrapper { 
            margin-top: 5rem; position: relative; 
            display: inline-block;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .n8n-link {
            display: inline-block; text-decoration: none;
            color: var(--text-color); font-weight: 900;
            font-size: 0.85rem; letter-spacing: 0.4em;
            padding: 16px 50px; border: 2px solid var(--text-color);
            background: var(--bg-color); cursor: pointer;
            position: relative; z-index: 10;
        }
        .button-wrapper:hover {
            transform: scale(1.15); letter-spacing: 0.6em;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        .button-wrapper:hover .n8n-link { background: var(--text-color); color: var(--bg-color); }
        
        .btn-glitch-cyan, .btn-glitch-magenta {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid; padding: inherit; font-size: inherit;
            font-weight: inherit; letter-spacing: inherit;
            visibility: hidden; pointer-events: none; z-index: -1;
        }

        /* High-speed Button Glitch */
        .button-wrapper.active .btn-glitch-cyan {
            visibility: visible; color: var(--glitch-cyan); border-color: var(--glitch-cyan);
            left: 8px; animation: glitch-anim 0.07s infinite linear alternate-reverse;
        }
        .button-wrapper.active .btn-glitch-magenta {
            visibility: visible; color: var(--glitch-magenta); border-color: var(--glitch-magenta);
            left: -8px; animation: glitch-anim-2 0.06s infinite linear alternate;
        }

        /* BG Grid */
        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-line"></div></div>
    <div id="scanline"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-text" id="glitch-container"></div>
        <div class="button-wrapper" id="n8n-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
            <div class="btn-glitch-cyan">N8N</div>
            <div class="btn-glitch-magenta">N8N</div>
        </div>
    </div>

    <script>
        const text = "K TO THE K";
        const container = document.getElementById('glitch-container');
        const buttonWrapper = document.getElementById('n8n-wrapper');
        const chars = [];

        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char';
            if (char.toUpperCase() === 'K') span.classList.add('big-k');
            
            const randomDelay = (Math.random() * -1).toFixed(2) + 's';
            const randomSpeed = (0.05 + Math.random() * 0.05).toFixed(2) + 's';
            span.style.setProperty('--g-delay', randomDelay);
            span.style.setProperty('--g-speed', randomSpeed);
            
            span.innerText = char === ' ' ? '\u00A0' : char;
            span.setAttribute('data-char', char);
            container.appendChild(span);
            chars.push(span);
        });

        const glitchableObjects = [...chars, buttonWrapper];

        let scanPos = -100;
        const speed = 5; // Faster Scanline

        function animateScan() {
            scanPos += speed;
            if (scanPos > window.innerHeight + 100) scanPos = -100;
            const scanline = document.getElementById('scanline');
            scanline.style.top = scanPos + 'px';

            glitchableObjects.forEach(obj => {
                const rect = obj.getBoundingClientRect();
                if (scanPos > rect.top && scanPos < rect.bottom) {
                    obj.classList.add('active');
                } else {
                    obj.classList.remove('active');
                }
            });
            requestAnimationFrame(animateScan);
        }
        animateScan();

        window.addEventListener('load', () => {
            setTimeout(() => document.body.classList.add('loaded'), 3200);
        });
    </script>
</body>
</html>
