<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --glitch-1: #00ffff; /* Cyan */
            --glitch-2: #ff00ff; /* Magenta */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        /* --- THE GLITCH --- */
        .glitch-wrapper {
            position: relative;
            display: inline-block;
        }

        h1 {
            font-weight: 900;
            font-size: clamp(3rem, 12vw, 10rem);
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            position: relative;
        }

        /* Create layers for the glitch */
        h1::before, h1::after {
            content: "K TO THE K";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: none; /* Hidden by default */
        }

        .glitch-wrapper:hover h1::before {
            display: block;
            left: 2px;
            text-shadow: -2px 0 var(--glitch-1);
            clip: rect(44px, 9999px, 56px, 0);
            animation: glitch-anim 0.2s infinite linear alternate-reverse;
        }

        .glitch-wrapper:hover h1::after {
            display: block;
            left: -2px;
            text-shadow: -2px 0 var(--glitch-2);
            clip: rect(10px, 9999px, 30px, 0);
            animation: glitch-anim-2 0.3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 20px, 0); }
            20% { clip: rect(80px, 9999px, 90px, 0); }
            40% { clip: rect(30px, 9999px, 40px, 0); }
            60% { clip: rect(60px, 9999px, 70px, 0); }
            80% { clip: rect(10px, 9999px, 30px, 0); }
            100% { clip: rect(40px, 9999px, 50px, 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip: rect(50px, 9999px, 60px, 0); }
            100% { clip: rect(10px, 9999px, 15px, 0); }
        }

        /* --- THE BUTTON --- */
        .button-wrapper {
            margin-top: 3rem;
        }

        .n8n-link {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 900;
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            padding: 12px 40px;
            border: 2px solid var(--text-color);
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: inline-block;
        }

        .n8n-link:hover {
            background: var(--text-color);
            color: var(--bg-color);
            letter-spacing: 0.5em; /* Expanding text on hover */
        }

        /* Background Grid */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-wrapper">
            <h1>K TO THE K</h1>
        </div>
        <div class="button-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
        </div>
    </div>

</body>
</html>
