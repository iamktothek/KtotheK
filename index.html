<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; cursor: default; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        let particles = [];
        const mouse = { x: -1000, y: -1000 };
        let isOverButton = false;

        class Particle {
            constructor(tx, ty, isBtn) {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.tx = tx;
                this.ty = ty;
                this.isBtn = isBtn;
                // Tiny particles for high-density look
                this.size = isBtn ? 1.2 : 1.5; 
                this.vx = 0;
                this.vy = 0;
            }

            update() {
                let targetX = this.tx;
                let targetY = this.ty;

                // 1. Subtle Repulsion (Text only)
                if (!this.isBtn) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < 2500) { // Radius threshold
                        const dist = Math.sqrt(distSq);
                        const force = (50 - dist) / 50;
                        targetX += (dx / dist) * force * 25; // Gentle push
                        targetY += (dy / dist) * force * 25;
                    }
                }

                // 2. Glitch effect (Button only)
                if (this.isBtn && isOverButton) {
                    targetX += (Math.random() - 0.5) * 5;
                    targetY += (Math.random() - 0.5) * 5;
                }

                // 3. Physics return
                this.x += (targetX - this.x) * 0.07;
                this.y += (targetY - this.y) * 0.07;
            }

            draw() {
                ctx.fillStyle = '#000000';
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function init() {
            resize();
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = 2000;
            tempCanvas.height = 1000;

            tCtx.fillStyle = 'white';
            tCtx.fillRect(0, 0, 2000, 1000);
            
            tCtx.fillStyle = 'black';
            tCtx.font = '900 220px sans-serif'; 
            tCtx.textAlign = 'center';
            tCtx.fillText("K TO THE K", 1000, 400);

            // Draw Button
            tCtx.fillRect(750, 580, 500, 160);
            tCtx.fillStyle = 'white';
            tCtx.font = 'bold 100px sans-serif';
            tCtx.fillText("N8N", 1000, 700);

            const data = tCtx.getImageData(0, 0, 2000, 1000).data;
            
            // DRAMATICALLY INCREASED DENSITY
            const step = 3; // Lower = higher density. 3 is the "sweet spot" for thousands of dots.
            const points = [];

            for (let y = 0; y < 1000; y += step) {
                for (let x = 0; x < 2000; x += step) {
                    const i = (y * 2000 + x) * 4;
                    if (data[i] < 200) {
                        points.push({
                            x: x,
                            y: y,
                            isBtn: y > 520
                        });
                    }
                }
            }

            const scale = (width * 0.7) / 2000; 
            const offsetX = (width - (2000 * scale)) / 2;
            const offsetY = (height - (1000 * scale)) / 2;

            particles = points.map(p => new Particle(
                p.x * scale + offsetX, 
                p.y * scale + offsetY, 
                p.isBtn
            ));
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            // Slight trails effect (optional, change to clearRect for clean look)
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            const scale = (width * 0.7) / 2000;
            const btnLeft = (750 * scale) + (width - (2000 * scale)) / 2;
            const btnRight = (1250 * scale) + (width - (2000 * scale)) / 2;
            const btnTop = (580 * scale) + (height - (1000 * scale)) / 2;
            const btnBottom = (740 * scale) + (height - (1000 * scale)) / 2;

            isOverButton = (mouse.x > btnLeft && mouse.x < btnRight && mouse.y > btnTop && mouse.y < btnBottom);
            canvas.style.cursor = isOverButton ? 'pointer' : 'default';
        });

        window.addEventListener('click', () => {
            if (isOverButton) window.location.href = "https://n8n.ktothek.com";
        });

        window.addEventListener('resize', () => {
            resize();
            init(); 
        });

        init();
        animate();
    </script>
</body>
</html>
