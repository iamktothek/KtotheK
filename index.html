<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; cursor: default; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        let particles = [];
        const particleCount = 2500; // Efficient count for pure JS
        const mouse = { x: -1000, y: -1000 };
        let isOverButton = false;

        class Particle {
            constructor(tx, ty, isBtn) {
                // Start scattered
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                // Target position
                this.tx = tx;
                this.ty = ty;
                this.isBtn = isBtn;
                this.size = isBtn ? 2.5 : 3;
                this.vx = 0;
                this.vy = 0;
            }

            update() {
                let targetX = this.tx;
                let targetY = this.ty;

                // 1. Mouse Repulsion (Text only)
                if (!this.isBtn) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < 6000) { // Repulsion radius
                        const dist = Math.sqrt(distSq);
                        const force = (80 - dist) / 80;
                        targetX += (dx / dist) * force * 100;
                        targetY += (dy / dist) * force * 100;
                    }
                }

                // 2. Glitch effect (Button only)
                if (this.isBtn && isOverButton) {
                    targetX += (Math.random() - 0.5) * 6;
                    targetY += (Math.random() - 0.5) * 6;
                }

                // 3. Spring Physics
                this.vx = (targetX - this.x) * 0.08;
                this.vy = (targetY - this.y) * 0.08;
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = '#000000';
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function init() {
            resize();
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = 2000;
            tempCanvas.height = 1000;

            tCtx.fillStyle = 'white';
            tCtx.fillRect(0, 0, 2000, 1000);
            
            // Draw Text
            tCtx.fillStyle = 'black';
            tCtx.font = 'bold 180px sans-serif';
            tCtx.textAlign = 'center';
            tCtx.fillText("K TO THE K", 1000, 400);

            // Draw Button
            tCtx.fillRect(800, 580, 400, 140);
            tCtx.fillStyle = 'white';
            tCtx.font = 'bold 80px sans-serif';
            tCtx.fillText("N8N", 1000, 680);

            const data = tCtx.getImageData(0, 0, 2000, 1000).data;
            const step = 10; // Density control
            const points = [];

            for (let y = 0; y < 1000; y += step) {
                for (let x = 0; x < 2000; x += step) {
                    const i = (y * 2000 + x) * 4;
                    if (data[i] < 200) {
                        points.push({
                            x: x,
                            y: y,
                            isBtn: y > 500
                        });
                    }
                }
            }

            // Map points to particles and scale to fit screen
            const scale = (width * 0.7) / 2000;
            const offsetX = (width - (2000 * scale)) / 2;
            const offsetY = (height - (1000 * scale)) / 2;

            particles = points.map(p => new Particle(
                p.x * scale + offsetX, 
                p.y * scale + offsetY, 
                p.isBtn
            ));
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            // Check if mouse is over any button particle area
            const scale = (width * 0.7) / 2000;
            const btnLeft = (800 * scale) + (width - (2000 * scale)) / 2;
            const btnRight = (1200 * scale) + (width - (2000 * scale)) / 2;
            const btnTop = (580 * scale) + (height - (1000 * scale)) / 2;
            const btnBottom = (720 * scale) + (height - (1000 * scale)) / 2;

            isOverButton = (mouse.x > btnLeft && mouse.x < btnRight && mouse.y > btnTop && mouse.y < btnBottom);
            canvas.style.cursor = isOverButton ? 'pointer' : 'default';
        });

        window.addEventListener('click', () => {
            if (isOverButton) window.location.href = "https://n8n.ktothek.com";
        });

        window.addEventListener('resize', () => {
            resize();
            init(); // Re-center on resize
        });

        init();
        animate();
    </script>
</body>
</html>
