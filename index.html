<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; cursor: default; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        let particles = [];
        const mouse = { x: -1000, y: -1000 };
        let isOverButton = false;

        class Particle {
            constructor(tx, ty, isBtn) {
                // SPAWN LOGIC: Drift in from the edges like a cloud
                const edge = Math.floor(Math.random() * 4);
                if (edge === 0) { this.x = Math.random() * window.innerWidth; this.y = -50; }
                else if (edge === 1) { this.x = window.innerWidth + 50; this.y = Math.random() * window.innerHeight; }
                else if (edge === 2) { this.x = Math.random() * window.innerWidth; this.y = window.innerHeight + 50; }
                else { this.x = -50; this.y = Math.random() * window.innerHeight; }

                this.tx = tx;
                this.ty = ty;
                this.isBtn = isBtn;
                
                // DUST SIZE VARIANCE: Much wider range for organic texture
                // 0.2px is almost invisible, 2.5px is a distinct grain
                this.size = Math.random() * Math.random() * 2.5 + 0.2; 
                
                // ASYMPTOTIC DRIFT: Constant pull, no bounce
                this.ease = 0.01 + Math.random() * 0.02; 
                this.driftAngle = Math.random() * Math.PI * 2;
                this.driftSpeed = 0.2 + Math.random() * 0.5;
            }

            update() {
                // Subtle organic wavering
                this.driftAngle += 0.01;
                const ox = Math.cos(this.driftAngle) * this.driftSpeed;
                const oy = Math.sin(this.driftAngle) * this.driftSpeed;

                let targetX = this.tx + ox;
                let targetY = this.ty + oy;

                // Subtle Repulsion
                if (!this.isBtn) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const dSq = dx * dx + dy * dy;
                    if (dSq < 2000) { 
                        const d = Math.sqrt(dSq);
                        const f = (45 - d) / 45;
                        targetX += (dx / d) * f * 12; 
                        targetY += (dy / d) * f * 12;
                    }
                }

                if (this.isBtn && isOverButton) {
                    targetX += (Math.random() - 0.5) * 4;
                    targetY += (Math.random() - 0.5) * 4;
                }

                // Smooth Glide
                this.x += (targetX - this.x) * this.ease;
                this.y += (targetY - this.y) * this.ease;
            }

            draw() {
                ctx.fillStyle = 'rgba(0,0,0,' + (Math.random() * 0.3 + 0.6) + ')'; // Random opacity for grain
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            resize();
            const tCvs = document.createElement('canvas');
            const tCtx = tCvs.getContext('2d');
            tCvs.width = 2000; tCvs.height = 1000;

            tCtx.fillStyle = 'white'; tCtx.fillRect(0, 0, 2000, 1000);
            tCtx.fillStyle = 'black';
            tCtx.font = '900 230px system-ui, sans-serif'; 
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillText("K to the K", 1000, 380);

            // Pill Button
            const bW = 440, bH = 150, bX = 1000 - bW/2, bY = 580;
            tCtx.beginPath();
            tCtx.roundRect(bX, bY, bW, bH, 75);
            tCtx.fill();

            tCtx.fillStyle = 'white';
            tCtx.font = 'bold 85px system-ui, sans-serif'; 
            tCtx.fillText("N8N", 1000, bY + bH/2 + 5);

            const img = tCtx.getImageData(0, 0, 2000, 1000).data;
            const points = [];
            
            // DITHERED SAMPLING: Lower step but with random probability
            for (let y = 0; y < 1000; y += 2) {
                for (let x = 0; x < 2000; x += 2) {
                    if (img[(y * 2000 + x) * 4] < 200) {
                        // Only create a particle 40% of the time for a "stippled" look
                        if (Math.random() > 0.6) {
                            points.push({
                                x: x + (Math.random() - 0.5) * 4,
                                y: y + (Math.random() - 0.5) * 4,
                                isBtn: y > 500
                            });
                        }
                    }
                }
            }

            const scale = (width * 0.75) / 2000; 
            const ox = (width - (2000 * scale)) / 2;
            const oy = (height - (1000 * scale)) / 2;

            particles = points.map(p => new Particle(p.x * scale + ox, p.y * scale + oy, p.isBtn));
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            const sc = (width * 0.75) / 2000;
            const bCY = (655 * sc) + (height - (1000 * sc)) / 2;
            const bW = 440 * sc, bH = 150 * sc;
            isOverButton = (mouse.x > width/2 - bW/2 && mouse.x < width/2 + bW/2 && mouse.y > bCY - bH/2 && mouse.y < bCY + bH/2);
            canvas.style.cursor = isOverButton ? 'pointer' : 'default';
        });

        window.addEventListener('click', () => { if (isOverButton) window.location.href = "https://n8n.ktothek.com"; });
        window.addEventListener('resize', () => { resize(); init(); });

        init(); animate();
    </script>
</body>
</html>
