<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; cursor: default; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        let particles = [];
        const mouse = { x: -1000, y: -1000 };
        let isOverButton = false;

        class Particle {
            constructor(tx, ty, isBtn) {
                // Chaotic scattered start
                this.x = (Math.random() - 0.5) * (window.innerWidth * 5) + (window.innerWidth / 2);
                this.y = (Math.random() - 0.5) * (window.innerHeight * 5) + (window.innerHeight / 2);
                
                this.tx = tx;
                this.ty = ty;
                this.isBtn = isBtn;
                this.size = isBtn ? 1.4 : 1.8; 
                
                // Slow cinematic speed
                this.ease = 0.01 + (Math.random() * 0.005); 
                this.friction = 0.93;
                this.vx = 0;
                this.vy = 0;
            }

            update() {
                let targetX = this.tx;
                let targetY = this.ty;

                if (!this.isBtn) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < 2200) { 
                        const dist = Math.sqrt(distSq);
                        const force = (45 - dist) / 45;
                        targetX += (dx / dist) * force * 15; 
                        targetY += (dy / dist) * force * 15;
                    }
                }

                if (this.isBtn && isOverButton) {
                    targetX += (Math.random() - 0.5) * 6;
                    targetY += (Math.random() - 0.5) * 6;
                }

                this.vx += (targetX - this.x) * this.ease;
                this.vy += (targetY - this.y) * this.ease;
                this.vx *= this.friction;
                this.vy *= this.friction;

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            resize();
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = 2000;
            tempCanvas.height = 1000;

            tCtx.fillStyle = 'white';
            tCtx.fillRect(0, 0, 2000, 1000);
            
            // Text Rendering: Explicitly NO TAILS (Sans-Serif)
            tCtx.fillStyle = 'black';
            tCtx.font = '900 220px system-ui, -apple-system, sans-serif'; 
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillText("K to the K", 1000, 380);

            // Centered Pill Button
            const btnW = 440;
            const btnH = 150;
            const btnX = 1000 - (btnW / 2);
            const btnY = 580;
            
            tCtx.beginPath();
            // Using a simple arc-based pill to ensure compatibility
            tCtx.moveTo(btnX + btnH/2, btnY);
            tCtx.lineTo(btnX + btnW - btnH/2, btnY);
            tCtx.arcTo(btnX + btnW, btnY, btnX + btnW, btnY + btnH, btnH/2);
            tCtx.lineTo(btnX + btnW, btnY + btnH - btnH/2);
            tCtx.arcTo(btnX + btnW, btnY + btnH, btnX + btnW - btnH/2, btnY + btnH, btnH/2);
            tCtx.lineTo(btnX + btnH/2, btnY + btnH);
            tCtx.arcTo(btnX, btnY + btnH, btnX, btnY + btnH - btnH/2, btnH/2);
            tCtx.lineTo(btnX, btnY + btnH/2);
            tCtx.arcTo(btnX, btnY, btnX + btnH/2, btnY, btnH/2);
            tCtx.fill();

            tCtx.fillStyle = 'white';
            tCtx.font = 'bold 85px system-ui, sans-serif'; 
            // Correcting baseline for perfect N8N centering
            tCtx.fillText("N8N", 1000, btnY + (btnH / 2) + 5);

            const data = tCtx.getImageData(0, 0, 2000, 1000).data;
            
            // Reduced density (Step 6)
            const step = 6; 
            const points = [];

            for (let y = 0; y < 1000; y += step) {
                for (let x = 0; x < 2000; x += step) {
                    const i = (y * 2000 + x) * 4;
                    if (data[i] < 200) {
                        points.push({
                            x: x,
                            y: y,
                            isBtn: y > 500
                        });
                    }
                }
            }

            const scale = (width * 0.7) / 2000; 
            const offsetX = (width - (2000 * scale)) / 2;
            const offsetY = (height - (1000 * scale)) / 2;

            particles = points.map(p => new Particle(
                p.x * scale + offsetX, 
                p.y * scale + offsetY, 
                p.isBtn
            ));
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            const scale = (width * 0.7) / 2000;
            const btnCenterY = (655 * scale) + (height - (1000 * scale)) / 2;
            const btnCenterX = width / 2;
            const btnW = 440 * scale;
            const btnH = 150 * scale;

            isOverButton = (
                mouse.x > btnCenterX - btnW/2 && 
                mouse.x < btnCenterX + btnW/2 && 
                mouse.y > btnCenterY - btnH/2 && 
                mouse.y < btnCenterY + btnH/2
            );
            canvas.style.cursor = isOverButton ? 'pointer' : 'default';
        });

        window.addEventListener('click', () => {
            if (isOverButton) window.location.href = "https://n8n.ktothek.com";
        });

        window.addEventListener('resize', () => {
            resize();
            init(); 
        });

        init();
        animate();
    </script>
</body>
</html>
