<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .n8n-button {
            margin-top: 350px; 
            pointer-events: auto;
            padding: 20px 50px;
            background: #000;
            color: #fff;
            text-decoration: none;
            letter-spacing: 0.5em;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            border-radius: 100px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .n8n-button:hover {
            transform: scale(1.1) translateY(-5px);
            background: #111;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <a href="https://n8n.ktothek.com" class="n8n-button">N8N</a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        let scene, camera, renderer, textGroup;
        const mouse = new THREE.Vector2();

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 80;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Chrome MatCap Texture
            const loader = new THREE.TextureLoader();
            // A brighter, more "aluminum" matcap
            const chromeTexture = loader.load('https://raw.githubusercontent.com/nidorx/matcaps/master/1024/7877EE_D87FC5_75D9C7_1C128C-1024px.png');
            // Adding a second option for pure silver chrome if the one above is too colorful:
            const silverTexture = loader.load('https://raw.githubusercontent.com/nidorx/matcaps/master/1024/B7B7B7_EFEFEF_343434_5C5C5C-1024px.png');

            const fontLoader = new FontLoader();
            fontLoader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                
                textGroup = new THREE.Group();
                const str = "K to the K";
                const letterSpacing = 8.5; // Massive spacing
                const totalWidth = (str.length - 1) * letterSpacing;

                const material = new THREE.MeshMatcapMaterial({
                    matcap: silverTexture,
                    color: 0xffffff
                });

                str.split('').forEach((char, i) => {
                    if (char === ' ') return;

                    const geometry = new TextGeometry(char, {
                        font: font,
                        size: 6,
                        height: 1,
                        curveSegments: 24, // Smoother holes
                        bevelEnabled: true,
                        bevelThickness: 1.5,
                        bevelSize: 0.8,
                        bevelOffset: 0,
                        bevelSegments: 12
                    });
                    geometry.center();

                    const mesh = new THREE.Mesh(geometry, material);
                    
                    // X-Position with wide spacing
                    mesh.position.x = (i * letterSpacing) - (totalWidth / 2) + 2; 
                    
                    // Random slight rotation for "floating balloon" feel
                    mesh.rotation.z = (Math.random() - 0.5) * 0.2;
                    
                    textGroup.add(mesh);
                });

                scene.add(textGroup);
                animate();
            });

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (textGroup) {
                // Tilt group based on mouse
                textGroup.rotation.y += (mouse.x * 0.3 - textGroup.rotation.y) * 0.05;
                textGroup.rotation.x += (-mouse.y * 0.2 - textGroup.rotation.x) * 0.05;

                // Individual letter float physics
                textGroup.children.forEach((child, i) => {
                    child.position.y = Math.sin(time + i * 0.4) * 1.8;
                    // Gentle swaying
                    child.rotation.y = Math.sin(time * 0.5 + i) * 0.1;
                });
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
