<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --glitch-cyan: #00f2ff;
            --glitch-magenta: #ff00c1;
            --scanline-color: rgba(0, 0, 0, 0.1);
        }

        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .loader-line {
            width: 0%; height: 2px;
            background: var(--text-color);
            animation: loadProgress 1.2s ease-in-out forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .loaded #loader { transform: translateY(-100%); }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        body.loaded { opacity: 1; }

        /* --- THE DYNAMIC SCANLINE --- */
        #scanline {
            position: absolute;
            top: -10px; left: 0; width: 100%; height: 4px;
            background: var(--scanline-color);
            z-index: 10;
            pointer-events: none;
        }

        .container { text-align: center; z-index: 5; }

        .glitch-text {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.1em;
            user-select: none;
        }

        .char { 
            position: relative; 
            display: inline-block;
            font-size: clamp(3rem, 10vw, 8rem);
        }

        .char.big-k {
            font-size: clamp(6rem, 20vw, 16rem);
            line-height: 0.8;
        }

        /* --- GLITCH STATES --- */
        .char::before, .char::after {
            content: attr(data-char);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: none;
        }

        /* Active class triggered by JS Scanline or CSS Hover */
        .char.active::before, .char:hover::before {
            display: block;
            left: 5px;
            text-shadow: -3px 0 var(--glitch-cyan);
            animation: glitch-anim 0.2s infinite linear;
            z-index: -1;
        }

        .char.active::after, .char:hover::after {
            display: block;
            left: -5px;
            text-shadow: 3px 0 var(--glitch-magenta);
            animation: glitch-anim-2 0.2s infinite linear;
            z-index: -2;
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(10% 0 60% 0); }
            100% { clip-path: inset(40% 0 20% 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(30% 0 30% 0); }
            100% { clip-path: inset(10% 0 70% 0); }
        }

        /* --- BUTTON --- */
        .button-wrapper { margin-top: 5rem; }

        .n8n-link {
            display: inline-block;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 0.4em;
            padding: 16px 50px;
            border: 2px solid var(--text-color);
            background: transparent;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .n8n-link:hover {
            background: var(--text-color);
            color: var(--bg-color);
            transform: scale(1.15);
            letter-spacing: 0.6em;
        }

        .n8n-link:active {
            transform: scale(0.95);
            background: #111;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-line"></div></div>
    <div id="scanline"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-text" id="glitch-container"></div>
        <div class="button-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
        </div>
    </div>

    <script>
        const text = "K TO THE K";
        const container = document.getElementById('glitch-container');
        const scanline = document.getElementById('scanline');
        const chars = [];

        // Build characters
        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char';
            if (char.toUpperCase() === 'K') span.classList.add('big-k');
            span.innerText = char === ' ' ? '\u00A0' : char;
            span.setAttribute('data-char', char);
            container.appendChild(span);
            chars.push(span);
        });

        // Scanline movement and collision logic
        let scanPos = -50;
        const speed = 4; // Pixels per frame

        function animateScan() {
            scanPos += speed;
            if (scanPos > window.innerHeight + 50) scanPos = -50;
            
            scanline.style.top = scanPos + 'px';

            // Check collision with each character
            chars.forEach(char => {
                const rect = char.getBoundingClientRect();
                // If scanline is within the character's vertical space
                if (scanPos > rect.top && scanPos < rect.bottom) {
                    char.classList.add('active');
                } else {
                    char.classList.remove('active');
                }
            });

            requestAnimationFrame(animateScan);
        }

        animateScan();

        window.addEventListener('load', () => {
            setTimeout(() => document.body.classList.add('loaded'), 1200);
        });
    </script>
</body>
</html>
