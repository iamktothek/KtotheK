<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K to the K</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
width:100%;
background:#050510;
color:white;
font-family:'Orbitron',sans-serif;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

#tsparticles{
position:fixed;
width:100%;
height:100%;
z-index:0;
}

.container{
position:relative;
z-index:2;
text-align:center;
animation:fadeIn 1.5s ease forwards;
}

.title{
font-size:clamp(3rem,8vw,6rem);
letter-spacing:.25em;
text-transform:uppercase;

background:linear-gradient(90deg,#00f2ff,#ff00ea,#00f2ff);
background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
glowPulse 3s ease-in-out infinite,
gradientMove 6s linear infinite;
}

.divider{
width:160px;
height:2px;
margin:30px auto;
background:linear-gradient(90deg,transparent,#00eaff,transparent);
box-shadow:0 0 10px #00eaff;
}

.button{
display:inline-block;
margin-top:10px;
padding:16px 42px;
font-size:1.2rem;
letter-spacing:.2em;
text-decoration:none;
color:#00eaff;
border:2px solid #00eaff;
border-radius:8px;
position:relative;
overflow:hidden;
transition:.3s;
}

.button::before{
content:"";
position:absolute;
inset:-2px;
background:linear-gradient(120deg,#00eaff,#ff00f7,#00eaff);
filter:blur(10px);
opacity:.4;
z-index:-1;
transition:.3s;
}

.button:hover{
color:#fff;
border-color:#ff00f7;
box-shadow:
0 0 10px #00eaff,
0 0 20px #ff00f7,
0 0 40px #ff00f7;
transform:translateY(-3px);
}

.button:active{
transform:scale(.96);
}

@keyframes glowPulse{

0%,100%{
text-shadow:
0 0 10px #00eaff,
0 0 20px #ff00f7,
0 0 40px #ff00f7;
}

50%{
text-shadow:
0 0 20px #00eaff,
0 0 40px #ff00f7,
0 0 80px #ff00f7;
}

}

@keyframes gradientMove{

0%{background-position:0%}
100%{background-position:200%}

}

@keyframes fadeIn{

0%{
opacity:0;
transform:translateY(20px)
}

100%{
opacity:1;
transform:translateY(0)
}

}

</style>
</head>

<body>

<div id="tsparticles"></div>

<div class="container">

<div class="title">K to the K</div>

<div class="divider"></div>

<a class="button" href="https://n8n.ktothek.com">N8N</a>

</div>


<script src="https://cdn.jsdelivr.net/npm/tsparticles@3/tsparticles.bundle.min.js"></script>

<script>

tsParticles.load("tsparticles", {

background:{
color:"#050510"
},

fpsLimit:60,

particles:{

number:{
value:80,
density:{enable:true,area:800}
},

color:{
value:["#00eaff","#ff00f7","#ffffff"]
},

shape:{type:"circle"},

opacity:{
value:0.7
},

size:{
value:{min:1,max:3}
},

links:{
enable:true,
distance:140,
color:"#00eaff",
opacity:0.25,
width:1
},

move:{
enable:true,
speed:1,
outModes:"bounce"
}

},

interactivity:{

events:{
onClick:{
enable:true,
mode:"push"
},

onHover:{
enable:true,
mode:"repulse"
},

resize:true
},

modes:{

push:{
quantity:6
},

repulse:{
distance:120,
duration:0.4
}

}

},

detectRetina:true

});

</script>

</body>
</html>
