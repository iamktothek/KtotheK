<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f7f9;
            --text-color: #000000;
            --glitch-cyan: #00f2ff;
            --glitch-magenta: #ff00c1;
            --scanline-color: rgba(0, 0, 0, 0.12);
        }

        /* --- STABLE FADE-IN LOADER --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center; justify-content: center;
            transition: opacity 1.5s ease-in-out;
        }

        .loader-beam {
            width: 0%; height: 1px;
            background: #fff;
            box-shadow: 0 0 8px #fff;
            animation: beamExpand 1s forwards;
        }

        @keyframes beamExpand {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        body.loaded #loader {
            opacity: 0;
            pointer-events: none;
        }

        /* --- VISIBLE VHS DISTORTION --- */
        .vhs-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 40;
            pointer-events: none;
            opacity: 0.15;
            animation: vhs-flicker 0.15s infinite;
        }

        @keyframes vhs-flicker {
            0% { transform: translateY(0); }
            100% { transform: translateY(1px); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
            opacity: 0;
            transition: opacity 2s ease-in;
        }

        body.loaded { opacity: 1; }

        #scanline {
            position: absolute;
            top: -10px; left: 0; width: 100%; height: 20px;
            background: var(--scanline-color);
            z-index: 20; pointer-events: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }

        .container { text-align: center; z-index: 5; }

        /* --- TYPOGRAPHY --- */
        .glitch-text {
            font-weight: 900; text-transform: uppercase;
            letter-spacing: -0.02em; display: flex;
            justify-content: center; align-items: center;
            gap: 0.1em; user-select: none;
        }
        .char { position: relative; display: inline-block; font-size: clamp(3rem, 10vw, 8rem); }
        .char.big-k { font-size: clamp(6rem, 20vw, 16rem); line-height: 0.8; }

        /* --- SLOWER GLITCH (Reverted) --- */
        .char::before, .char::after {
            content: attr(data-char);
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            visibility: hidden; background: transparent;
        }

        .char.active::before, .char:hover::before {
            visibility: visible; left: 5px;
            color: var(--glitch-cyan); z-index: -1;
            animation: glitch-anim 0.25s infinite linear alternate-reverse;
            animation-delay: var(--g-delay);
        }

        .char.active::after, .char:hover::after {
            visibility: visible; left: -5px;
            color: var(--glitch-magenta); z-index: -2;
            animation: glitch-anim-2 0.3s infinite linear alternate;
            animation-delay: calc(var(--g-delay) * 0.5);
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(-2px, 1px); }
            100% { clip-path: inset(30% 0 20% 0); transform: translate(2px, -1px); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(30% 0 30% 0); transform: translate(2px, 1px); }
            100% { clip-path: inset(10% 0 70% 0); transform: translate(-2px, -1px); }
        }

        /* --- PHYSICAL BUTTON INTERACTION --- */
        .button-wrapper { 
            margin-top: 5rem; 
            position: relative; 
            display: inline-block;
            /* Springy snap-back effect */
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Scanline "Weight" Effect */
        .button-wrapper.active {
            transform: translateY(10px) scale(0.98);
        }

        .n8n-link {
            display: inline-block; text-decoration: none;
            color: var(--text-color); font-weight: 900;
            font-size: 0.85rem; letter-spacing: 0.4em;
            padding: 18px 55px; border: 2px solid var(--text-color);
            background: var(--bg-color); cursor: pointer;
            transition: all 0.3s ease;
        }

        .button-wrapper:hover .n8n-link {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-beam"></div></div>
    <div class="vhs-overlay"></div>
    <div id="scanline"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-text" id="glitch-container"></div>
        <div class="button-wrapper" id="n8n-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
        </div>
    </div>

    <script>
        const text = "K TO THE K";
        const container = document.getElementById('glitch-container');
        const buttonWrapper = document.getElementById('n8n-wrapper');
        const chars = [];

        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char';
            if (char.toUpperCase() === 'K') span.classList.add('big-k');
            const randomDelay = (Math.random() * -1).toFixed(2) + 's';
            const randomSpeed = (0.2 + Math.random() * 0.1).toFixed(2) + 's';
            span.style.setProperty('--g-delay', randomDelay);
            span.style.setProperty('--g-speed', randomSpeed);
            span.innerText = char === ' ' ? '\u00A0' : char;
            span.setAttribute('data-char', char);
            container.appendChild(span);
            chars.push(span);
        });

        const interactableObjects = [...chars, buttonWrapper];
        let scanPos = -100;
        const speed = 4; 

        function animateScan() {
            scanPos += speed;
            if (scanPos > window.innerHeight + 100) scanPos = -100;
            const scanline = document.getElementById('scanline');
            if(scanline) scanline.style.top = scanPos + 'px';

            interactableObjects.forEach(obj => {
                const rect = obj.getBoundingClientRect();
                if (scanPos > rect.top && scanPos < rect.bottom) {
                    obj.classList.add('active');
                } else {
                    obj.classList.remove('active');
                }
            });
            requestAnimationFrame(animateScan);
        }
        animateScan();

        // Immediate logic for the loader reveal
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 1000); // Wait for beam to exist before fading in
        });
    </script>
</body>
</html>
