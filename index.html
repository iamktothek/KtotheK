<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .ui-overlay {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .n8n-button {
            margin-top: 280px; 
            pointer-events: auto;
            padding: 18px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            letter-spacing: 0.5em;
            font-size: 10px;
            font-weight: 800;
            border-radius: 100px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(20px);
        }

        .n8n-button:hover {
            background: #fff;
            color: #000;
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-overlay">
        <a href="https://n8n.ktothek.com" class="n8n-button">N8N</a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        let scene, camera, renderer, textGroup;
        let mouse = { x: 0, y: 0 };

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // The "Balloon" Chrome Trick: MatCap
            // This is a base64 encoded "Chrome" texture to ensure it works without external assets
            const loader = new THREE.TextureLoader();
            const matcap = loader.load('https://raw.githubusercontent.com/nidorx/matcaps/master/1024/E6E6E6_333333_000000_666666-1024px.png');

            const fontLoader = new FontLoader();
            fontLoader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                const textGeo = new TextGeometry('K to the K', {
                    font: font,
                    size: 6,
                    height: 1.5,
                    curveSegments: 32,
                    bevelEnabled: true,
                    bevelThickness: 1.8, // Heavy thickness for "inflated" look
                    bevelSize: 1.2,      // Wide bevel for rounding
                    bevelOffset: 0,
                    bevelSegments: 20    // High segments for smooth balloon curves
                });

                textGeo.center();

                const material = new THREE.MeshMatcapMaterial({
                    matcap: matcap,
                    color: 0xffffff
                });

                textGroup = new THREE.Mesh(textGeo, material);
                scene.add(textGroup);
                animate();
            });

            // Lights for the scene background
            const light = new THREE.PointLight(0xffffff, 100);
            light.position.set(0, 0, 10);
            scene.add(light);

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (textGroup) {
                // Smooth rotation following mouse
                textGroup.rotation.y += (mouse.x * 0.4 - textGroup.rotation.y) * 0.05;
                textGroup.rotation.x += (-mouse.y * 0.4 - textGroup.rotation.x) * 0.05;

                // Balloon "floating" physics
                textGroup.position.y = Math.sin(time * 0.8) * 1.5;
                textGroup.position.x = Math.cos(time * 0.5) * 0.5;
                
                // Subtle "inflation" pulse
                const scale = 1 + Math.sin(time * 2) * 0.02;
                textGroup.scale.set(scale, scale, scale);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
