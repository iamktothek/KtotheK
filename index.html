<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: white; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

    <script>
        let scene, camera, renderer, points;
        const mouse = { x: -1000, y: -1000 }; 
        const targetRot = { x: 0, y: 0 };
        let isOverButton = false;
        let assembled = false;
        let assembleProgress = 0;

        const count = 4000; // Lower count for maximum performance/compatibility
        const pos = new Float32Array(count * 3);
        const targetPos = new Float32Array(count * 3);
        const isBtn = new Uint8Array(count);

        try {
            init();
            animate();
        } catch (e) {
            console.error("Three.js failed to load:", e);
            document.body.innerHTML = "<h1 style='margin:20px'>Site Loading Error. Please refresh.</h1>";
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 1. Initial random scatter
            for (let i = 0; i < count; i++) {
                pos[i*3] = (Math.random() - 0.5) * 50;
                pos[i*3+1] = (Math.random() - 0.5) * 50;
                pos[i*3+2] = (Math.random() - 0.5) * 10;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.12,
                color: 0x000000,
                transparent: true,
                opacity: 0.8
            });

            points = new THREE.Points(geo, mat);
            scene.add(points);

            // 2. Generate Map
            const cvs = document.createElement('canvas');
            const ctx = cvs.getContext('2d');
            cvs.width = 1000; cvs.height = 500;
            ctx.fillStyle = 'white'; ctx.fillRect(0,0,1000,500);
            
            ctx.fillStyle = 'black';
            ctx.font = 'bold 110px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("K TO THE K", 500, 200);

            // Button Box
            ctx.fillRect(360, 310, 280, 100);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 50px Arial, sans-serif';
            ctx.fillText("N8N", 500, 375);

            const data = ctx.getImageData(0,0,1000,500).data;
            const validPts = [];
            for(let y=0; y<500; y+=4) {
                for(let x=0; x<1000; x+=4) {
                    if(data[(y*1000+x)*4] < 200) {
                        validPts.push({x: (x-500)*0.02, y: (250-y)*0.02, b: y > 280});
                    }
                }
            }

            for(let i=0; i<count; i++) {
                const p = validPts[i % validPts.length];
                targetPos[i*3] = p.x;
                targetPos[i*3+1] = p.y;
                targetPos[i*3+2] = 0;
                isBtn[i] = p.b ? 1 : 0;
            }

            // Mouse Events
            window.addEventListener('mousemove', e => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                targetRot.y = mouse.x * 0.2;
                targetRot.x = -mouse.y * 0.2;
                
                // Button Detect
                isOverButton = (mouse.y < -0.1 && mouse.y > -0.6 && Math.abs(mouse.x) < 0.2);
                document.body.style.cursor = isOverButton ? 'pointer' : 'default';
            });

            window.addEventListener('click', () => { if(isOverButton) window.location.href="https://n8n.ktothek.com"; });
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // Assembly transition
            if (assembleProgress < 1) assembleProgress += 0.005;

            points.rotation.x += (targetRot.x - points.rotation.x) * 0.05;
            points.rotation.y += (targetRot.y - points.rotation.y) * 0.05;

            const pArray = points.geometry.attributes.position.array;
            
            // Interaction logic
            const mx = mouse.x * 10;
            const my = mouse.y * 6;

            for(let i=0; i<count; i++) {
                let tx = targetPos[i*3];
                let ty = targetPos[i*3+1];
                let tz = targetPos[i*3+2];

                if(isBtn[i] === 0) {
                    // Repulsion for K TO THE K
                    const dx = pArray[i*3] - mx;
                    const dy = pArray[i*3+1] - my;
                    const dSq = dx*dx + dy*dy;
                    if(dSq < 2.5) {
                        const d = Math.sqrt(dSq);
                        const f = (2.5 - d) / 2.5;
                        tx += (dx/d) * f * 4;
                        ty += (dy/d) * f * 4;
                    }
                } else if (isOverButton) {
                    // Glitch for Button
                    tx += (Math.random() - 0.5) * 0.2;
                    ty += (Math.random() - 0.5) * 0.2;
                }

                // Smooth movement
                pArray[i*3] += (tx - pArray[i*3]) * 0.08;
                pArray[i*3+1] += (ty - pArray[i*3+1]) * 0.08;
                pArray[i*3+2] += (tz - pArray[i*3+2]) * 0.08;
            }

            points.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
