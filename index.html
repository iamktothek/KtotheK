<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; cursor: default; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, time = 0;
        
        let particles = [];
        const mouse = { x: -1000, y: -1000 };
        let isOverButton = false;

        class Particle {
            constructor(tx, ty, isBtn) {
                // Massive scatter at start - completely covering the viewport
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                if(Math.random() > 0.5) this.x = Math.random() > 0.5 ? -100 : window.innerWidth + 100;
                
                this.tx = tx;
                this.ty = ty;
                this.isBtn = isBtn;
                
                // Randomized size for non-uniform texture
                this.size = isBtn ? 1.5 : (Math.random() * 1.6 + 0.6); 
                
                // Assembly speed: Constant and slow (no bounce)
                this.speed = 0.02 + Math.random() * 0.02;
                // Unique offset for the "breathing" effect
                this.angle = Math.random() * Math.PI * 2;
            }

            update() {
                // Subtle "Breathing" drift logic
                this.angle += 0.02;
                let driftX = Math.cos(this.angle) * 0.8;
                let driftY = Math.sin(this.angle) * 0.8;

                let targetX = this.tx + driftX;
                let targetY = this.ty + driftY;

                // 1. Subtle Repulsion (Text only)
                if (!this.isBtn) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < 2500) { 
                        const dist = Math.sqrt(distSq);
                        const force = (50 - dist) / 50;
                        targetX += (dx / dist) * force * 15; 
                        targetY += (dy / dist) * force * 15;
                    }
                }

                // 2. Glitch effect (Button only)
                if (this.isBtn && isOverButton) {
                    targetX += (Math.random() - 0.5) * 6;
                    targetY += (Math.random() - 0.5) * 6;
                }

                // 3. Linear Smooth Damping (Replaces Pulsating Physics)
                this.x += (targetX - this.x) * this.speed;
                this.y += (targetY - this.y) * this.speed;
            }

            draw() {
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            resize();
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = 2000;
            tempCanvas.height = 1000;

            tCtx.fillStyle = 'white';
            tCtx.fillRect(0, 0, 2000, 1000);
            
            tCtx.fillStyle = 'black';
            tCtx.font = '900 230px system-ui, -apple-system, sans-serif'; 
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillText("K to the K", 1000, 380);

            // Centered Pill Button
            const btnW = 440;
            const btnH = 150;
            const btnX = 1000 - (btnW / 2);
            const btnY = 580;
            
            tCtx.beginPath();
            tCtx.roundRect(btnX, btnY, btnW, btnH, 75);
            tCtx.fill();

            tCtx.fillStyle = 'white';
            tCtx.font = 'bold 85px system-ui, sans-serif'; 
            tCtx.fillText("N8N", 1000, btnY + (btnH / 2) + 5);

            const data = tCtx.getImageData(0, 0, 2000, 1000).data;
            
            const step = 3; 
            const points = [];

            for (let y = 0; y < 1000; y += step) {
                for (let x = 0; x < 2000; x += step) {
                    const i = (y * 2000 + x) * 4;
                    if (data[i] < 200) {
                        points.push({
                            x: x + (Math.random() - 0.5) * 2,
                            y: y + (Math.random() - 0.5) * 2,
                            isBtn: y > 500
                        });
                    }
                }
            }

            const scale = (width * 0.7) / 2000; 
            const offsetX = (width - (2000 * scale)) / 2;
            const offsetY = (height - (1000 * scale)) / 2;

            particles = points.map(p => new Particle(
                p.x * scale + offsetX, 
                p.y * scale + offsetY, 
                p.isBtn
            ));
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            const scale = (width * 0.7) / 2000;
            const btnCenterY = (655 * scale) + (height - (1000 * scale)) / 2;
            const btnCenterX = width / 2;
            const btnW = 440 * scale;
            const btnH = 150 * scale;

            isOverButton = (
                mouse.x > btnCenterX - btnW/2 && 
                mouse.x < btnCenterX + btnW/2 && 
                mouse.y > btnCenterY - btnH/2 && 
                mouse.y < btnCenterY + btnH/2
            );
            canvas.style.cursor = isOverButton ? 'pointer' : 'default';
        });

        window.addEventListener('click', () => {
            if (isOverButton) window.location.href = "https://n8n.ktothek.com";
        });

        window.addEventListener('resize', () => {
            resize();
            init(); 
        });

        init();
        animate();
    </script>
</body>
</html>
