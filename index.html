<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f7f9;
            --text-color: #000000;
            --glitch-cyan: #00f2ff;
            --glitch-magenta: #ff00c1;
            --scanline-color: rgba(0, 0, 0, 0.5);
        }

        /* --- THE MECHANICAL SHUTTER REVEAL --- */
        #loader-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            pointer-events: none;
            overflow: hidden;
        }

        .shutter {
            flex: 1;
            background: #000;
            width: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }

        /* The white ignition beam - attached to the shutter edges */
        .shutter::after {
            content: "";
            position: absolute;
            left: 0; width: 100%; height: 2px;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            opacity: 0;
        }
        #shutter-top::after { bottom: 0; }
        #shutter-bottom::after { top: 0; }

        /* Animation sequence */
        .power-on .shutter::after { opacity: 1; width: 100%; transition: width 0.6s ease-in; }
        .loaded #shutter-top { transform: translateY(-100%); }
        .loaded #shutter-bottom { transform: translateY(100%); }

        /* --- PURE CSS VHS GRAIN (High Intensity) --- */
        .vhs-grain {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            z-index: 50;
            pointer-events: none;
            background-image: 
                repeating-radial-gradient(#000 0 0.0001%, #fff 0 0.0002%);
            background-size: 100px 100px;
            opacity: 0.08;
            animation: grain-flicker 0.15s steps(2) infinite;
        }

        @keyframes grain-flicker {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-1%, -1%); }
            50% { transform: translate(1%, 1%); }
            75% { transform: translate(-0.5%, 0.5%); }
            100% { transform: translate(0, 0); }
        }

        .vhs-lines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            z-index: 45;
            pointer-events: none;
            opacity: 0.1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        /* --- FAST THIN SCANLINE --- */
        #scanline {
            position: absolute;
            top: -10px; left: 0; width: 100%; height: 3px;
            background: var(--scanline-color);
            z-index: 20; pointer-events: none;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }

        .container { text-align: center; z-index: 5; }

        .glitch-text {
            font-weight: 900; text-transform: uppercase;
            letter-spacing: -0.02em; display: flex;
            justify-content: center; align-items: center;
            gap: 0.1em; user-select: none;
        }
        .char { position: relative; display: inline-block; font-size: clamp(3rem, 10vw, 8rem); }
        .char.big-k { font-size: clamp(6rem, 20vw, 16rem); line-height: 0.8; }

        /* --- GLITCH --- */
        .char::before, .char::after {
            content: attr(data-char);
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            visibility: hidden; background: transparent;
        }
        .char.active::before, .char:hover::before {
            visibility: visible; left: 6px; color: var(--glitch-cyan); z-index: -1;
            animation: glitch-anim 0.25s infinite linear alternate-reverse;
            animation-delay: var(--g-delay);
        }
        .char.active::after, .char:hover::after {
            visibility: visible; left: -6px; color: var(--glitch-magenta); z-index: -2;
            animation: glitch-anim-2 0.3s infinite linear alternate;
            animation-delay: calc(var(--g-delay) * 0.5);
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(-3px, 2px); }
            100% { clip-path: inset(30% 0 20% 0); transform: translate(3px, -2px); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(30% 0 30% 0); transform: translate(3px, 2px); }
            100% { clip-path: inset(10% 0 70% 0); transform: translate(-3px, -2px); }
        }

        /* --- AGGRESSIVE BUTTON PUSH --- */
        .button-wrapper { 
            margin-top: 5rem; 
            position: relative; 
            display: inline-block;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .button-wrapper.active {
            transform: translateY(45px) scaleY(0.75) scaleX(1.15);
            transition: transform 0.08s ease-out; 
        }

        .n8n-link {
            display: inline-block; text-decoration: none;
            color: var(--text-color); font-weight: 900;
            font-size: 0.85rem; letter-spacing: 0.4em;
            padding: 22px 65px; border: 3px solid var(--text-color);
            background: var(--bg-color); cursor: pointer;
            transition: 0.3s;
        }
        .button-wrapper:hover .n8n-link { background: var(--text-color); color: var(--bg-color); }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="shutter" id="shutter-top"></div>
        <div class="shutter" id="shutter-bottom"></div>
    </div>

    <div class="vhs-grain"></div>
    <div class="vhs-lines"></div>
    <div id="scanline"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-text" id="glitch-container"></div>
        <div class="button-wrapper" id="n8n-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
        </div>
    </div>

    <script>
        const text = "K TO THE K";
        const container = document.getElementById('glitch-container');
        const buttonWrapper = document.getElementById('n8n-wrapper');
        const loaderWrapper = document.getElementById('loader-wrapper');
        const chars = [];

        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char';
            if (char.toUpperCase() === 'K') span.classList.add('big-k');
            const randomDelay = (Math.random() * -1).toFixed(2) + 's';
            const randomSpeed = (0.2 + Math.random() * 0.1).toFixed(2) + 's';
            span.style.setProperty('--g-delay', randomDelay);
            span.style.setProperty('--g-speed', randomSpeed);
            span.innerText = char === ' ' ? '\u00A0' : char;
            span.setAttribute('data-char', char);
            container.appendChild(span);
            chars.push(span);
        });

        const interactableObjects = [...chars, buttonWrapper];
        let scanPos = -200;
        const speed = 9; // High speed scanline

        function animateScan() {
            scanPos += speed;
            if (scanPos > window.innerHeight + 200) scanPos = -200;
            const scanline = document.getElementById('scanline');
            if(scanline) scanline.style.top = scanPos + 'px';

            interactableObjects.forEach(obj => {
                const rect = obj.getBoundingClientRect();
                if (scanPos > rect.top && scanPos < rect.bottom) {
                    obj.classList.add('active');
                } else {
                    obj.classList.remove('active');
                }
            });
            requestAnimationFrame(animateScan);
        }

        animateScan();

        // Mechanical sequence logic
        window.addEventListener('load', () => {
            // Step 1: Fire the beam
            document.body.classList.add('power-on');
            
            // Step 2: Open shutters
            setTimeout(() => {
                loaderWrapper.classList.add('loaded');
            }, 800); 
        });
    </script>
</body>
</html>
