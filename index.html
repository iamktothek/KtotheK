<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K | N8N</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #fff; }
        
        #vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background: radial-gradient(circle, rgba(255,255,255,0) 30%, rgba(0,0,0,0.18) 100%);
            z-index: 10;
        }

        canvas { display: block; filter: contrast(120%); } /* Slight contrast boost for grit */

        #n8n-link {
            position: absolute; left: 50%; top: 72%; transform: translate(-50%, -50%);
            width: 240px; height: 90px; z-index: 20; cursor: pointer; text-decoration: none; color: transparent;
        }
    </style>
</head>
<body>

    <div id="vignette"></div>
    <a href="https://n8n.ktothek.com" id="n8n-link">N8N</a>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let particles = [];
        let fallingObjects = [];
        let frame = 0;
        
        const config = {
            density: 2.5, // Lower is denser
            repulsion: 35,
            chaosDuration: 100, // Frames of initial madness
        };

        class Particle {
            constructor(x, y) {
                // Initial Explosion State
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                
                // Destination with "Organic Jitter" (breaks the grid look)
                this.destX = x + (Math.random() - 0.5) * 3;
                this.destY = y + (Math.random() - 0.5) * 3;
                
                // Random Physical Personality
                this.vx = (Math.random() - 0.5) * 50; // High initial burst
                this.vy = (Math.random() - 0.5) * 50;
                this.friction = Math.random() * 0.05 + 0.88;
                this.ease = Math.random() * 0.1 + 0.02;
                this.size = Math.random() * 2.8 + 0.4; // Highly varied sizes
                this.color = Math.random() > 0.5 ? '#111' : '#333';
            }

            update(obstacles, isChaos) {
                // 1. Magnetic Return Force
                let dx = this.destX - this.x;
                let dy = this.destY - this.y;
                
                // Add "Turbulence" during chaos phase
                if (isChaos) {
                    this.vx += (Math.random() - 0.5) * 2;
                    this.vy += (Math.random() - 0.5) * 2;
                }

                this.vx += dx * this.ease;
                this.vy += dy * this.ease;

                // 2. Obstacle Propulsion
                obstacles.forEach(obj => {
                    let ox = obj.x - this.x;
                    let oy = obj.y - this.y;
                    let dist = Math.sqrt(ox * ox + oy * oy);
                    if (dist < obj.radius) {
                        let angle = Math.atan2(oy, ox);
                        let force = (obj.radius - dist) / obj.radius;
                        this.vx -= Math.cos(angle) * force * config.repulsion;
                        this.vy -= Math.sin(angle) * force * config.repulsion;
                    }
                });

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size); // Squares look grittier than arcs
            }
        }

        class FallingObject {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -100;
                this.vy = Math.random() * 4 + 2;
                this.radius = Math.random() * 50 + 40;
            }
            update() { this.y += this.vy; }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Setup Text & Button sampling
            ctx.fillStyle = "black";
            ctx.textAlign = "center";
            
            // "K to the K"
            ctx.font = "bold 140px Inter, system-ui, sans-serif";
            ctx.fillText("K to the K", canvas.width / 2, canvas.height / 2);
            
            // "N8N" Button - More robust frame
            const bW = 240, bH = 80, bX = canvas.width/2 - bW/2, bY = canvas.height*0.72 - bH/2;
            ctx.lineWidth = 6;
            ctx.strokeRect(bX, bY, bW, bH);
            ctx.font = "bold 50px Inter, system-ui, sans-serif";
            ctx.fillText("N8N", canvas.width / 2, (canvas.height * 0.72) + 18);

            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < canvas.height; y += config.density) {
                for (let x = 0; x < canvas.width; x += config.density) {
                    if (data[(x + y * canvas.width) * 4 + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            // White background fill for each frame
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            frame++;
            const isChaos = frame < config.chaosDuration;

            if (Math.random() < 0.02) fallingObjects.push(new FallingObject());

            fallingObjects.forEach((obj, i) => {
                obj.update();
                // Draw falling shadow objects (faint)
                ctx.fillStyle = 'rgba(0,0,0,0.03)';
                ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI*2); ctx.fill();
                if (obj.y > canvas.height + 100) fallingObjects.splice(i, 1);
            });

            particles.forEach(p => {
                p.update(fallingObjects, isChaos);
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
