<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Deep black background */
            overflow: hidden;
            font-family: sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .n8n-button {
            margin-top: 300px; /* Adjust based on text size */
            pointer-events: auto;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            text-decoration: none;
            letter-spacing: 0.3em;
            font-weight: bold;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .n8n-button:hover {
            background: white;
            color: black;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <a href="https://n8n.ktothek.com" class="n8n-button">N8N</a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        let scene, camera, renderer, textMesh;
        const mouse = { x: 0, y: 0 };

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 1. THE CHROME SECRET: MatCap Texture
            // This texture acts as the reflection. Without this, metal looks black in a black scene.
            const loader = new THREE.TextureLoader();
            const chromeMatcap = loader.load('https://raw.githubusercontent.com/nidorx/matcaps/master/1024/E6E6E6_333333_000000_666666-1024px.png');

            // 2. LOAD FONT
            const fontLoader = new FontLoader();
            fontLoader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                
                // 3. INFLATED GEOMETRY
                const geometry = new TextGeometry('K to the K', {
                    font: font,
                    size: 6,
                    height: 1,
                    curveSegments: 20,
                    bevelEnabled: true,
                    bevelThickness: 2, // This "puffs" the balloon out
                    bevelSize: 1.5,     // This rounds the edges
                    bevelOffset: 0,
                    bevelSegments: 15   // Smooth curves
                });
                geometry.center();

                const material = new THREE.MeshMatcapMaterial({
                    matcap: chromeMatcap,
                    color: 0xffffff
                });

                textMesh = new THREE.Mesh(geometry, material);
                scene.add(textMesh);
                animate();
            });

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (textMesh) {
                // Smoothly follow mouse
                textMesh.rotation.y += (mouse.x * 0.5 - textMesh.rotation.y) * 0.05;
                textMesh.rotation.x += (-mouse.y * 0.5 - textMesh.rotation.x) * 0.05;

                // Floating "Balloon" motion
                textMesh.position.y = Math.sin(time) * 1.5;
                
                // Subtle pulse (breathing)
                const pulse = 1 + Math.sin(time * 2) * 0.03;
                textMesh.scale.set(pulse, pulse, pulse);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
