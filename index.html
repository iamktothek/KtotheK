<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #ffffff; 
            cursor: default; 
            touch-action: none;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, points;
        let mouse = new THREE.Vector2();
        let targetRotation = new THREE.Vector2();
        
        // Significantly reduced density for a cleaner look
        const particleCount = 5000; 
        const positions = new Float32Array(particleCount * 3);
        const targets = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        
        let isOverButton = false;
        let buttonIndices = []; 

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 18; // Pull back to ensure 70% width fits

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. Initial Chaotic Scatter
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 50;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 50;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.08, // Slightly larger particles since there are fewer
                vertexColors: true,
                transparent: true,
                opacity: 0.9
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            generateMaps();

            // Assemble Animation
            gsap.to(positions, {
                endArray: targets,
                duration: 4.5,
                ease: "expo.out",
                onUpdate: () => { points.geometry.attributes.position.needsUpdate = true; }
            });

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onClick);
            window.addEventListener('resize', onWindowResize);
        }

        function generateMaps() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 2000;
            canvas.height = 1000;

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const vWidth = 2 * Math.tan((camera.fov * Math.PI) / 360) * camera.position.z * camera.aspect;
            const scale = (vWidth * 0.65) / canvas.width; // Locked to 65% width

            // DRAW TITLE (Centered)
            ctx.fillStyle = 'black';
            ctx.font = '900 180px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("K TO THE K", canvas.width / 2, 400);

            // DRAW BUTTON RECTANGLE (Lower)
            ctx.fillRect(canvas.width / 2 - 220, 600, 440, 160);

            // DRAW BUTTON TEXT (White on Black)
            ctx.fillStyle = 'white';
            ctx.font = '700 90px sans-serif';
            ctx.fillText("N8N", canvas.width / 2, 710);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const titlePoints = [];
            const buttonPoints = [];

            // Sampling logic
            for (let y = 0; y < canvas.height; y += 4) { // Increased step for lower density
                for (let x = 0; x < canvas.width; x += 4) {
                    const i = (y * canvas.width + x) * 4;
                    if (imgData[i] < 200) { // If it's not white
                        const pt = {
                            x: (x - canvas.width / 2) * scale,
                            y: (canvas.height / 2 - y) * scale,
                            isButton: (y > 500)
                        };
                        if (pt.isButton) buttonPoints.push(pt);
                        else titlePoints.push(pt);
                    }
                }
            }

            // Distribute particles
            for (let i = 0; i < particleCount; i++) {
                let pt;
                if (i < titlePoints.length) {
                    pt = titlePoints[i];
                    colors[i * 3] = 0; colors[i * 3 + 1] = 0; colors[i * 3 + 2] = 0; // Black
                } else {
                    pt = buttonPoints[i % buttonPoints.length];
                    colors[i * 3] = 0; colors[i * 3 + 1] = 0; colors[i * 3 + 2] = 0; // Black (inverted box is black)
                    buttonIndices.push(i);
                }
                targets[i * 3] = pt.x;
                targets[i * 3 + 1] = pt.y;
                targets[i * 3 + 2] = (Math.random() - 0.5) * 0.05;
            }
            points.geometry.attributes.color.needsUpdate = true;
        }

        function onMouseMove(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            targetRotation.y = mouse.x * 0.25;
            targetRotation.x = -mouse.y * 0.25;

            // Accurate bounding box for the button interaction
            if (mouse.y < -0.1 && mouse.y > -0.55 && Math.abs(mouse.x) < 0.18) {
                if(!isOverButton) {
                    isOverButton = true;
                    document.body.style.cursor = 'pointer';
                }
            } else {
                if(isOverButton) {
                    isOverButton = false;
                    document.body.style.cursor = 'default';
                }
            }
        }

        function onClick() {
            if (isOverButton) window.location.href = "https://n8n.ktothek.com";
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            points.rotation.y += (targetRotation.y - points.rotation.y) * 0.05;
            points.rotation.x += (targetRotation.x - points.rotation.x) * 0.05;

            const pos = points.geometry.attributes.position.array;
            
            for(let i = 0; i < particleCount; i++) {
                let tx = targets[i * 3];
                let ty = targets[i * 3 + 1];

                // Glitch effect: high intensity random offset when hovered
                if (isOverButton && buttonIndices.includes(i)) {
                    tx += (Math.random() - 0.5) * 0.25;
                    ty += (Math.random() - 0.5) * 0.25;
                }

                pos[i * 3] += (tx - pos[i * 3]) * 0.1;
                pos[i * 3 + 1] += (ty - pos[i * 3 + 1]) * 0.1;
                pos[i * 3 + 2] += (targets[i * 3 + 2] - pos[i * 3 + 2]) * 0.1;
            }
            
            points.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
