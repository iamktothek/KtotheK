<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K | N8N</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        /* Deep Vignette */
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(255,255,255,0) 40%, rgba(0,0,0,0.15) 100%);
            z-index: 10;
        }

        canvas {
            display: block;
        }

        /* Clickable Area for N8N */
        #n8n-link {
            position: absolute;
            left: 50%;
            top: 70%;
            transform: translate(-50%, -50%);
            width: 220px;
            height: 80px;
            z-index: 20;
            cursor: pointer;
            text-decoration: none;
            color: transparent;
        }
    </style>
</head>
<body>

    <div id="vignette"></div>
    <a href="https://n8n.ktothek.com" id="n8n-link" aria-label="Go to N8N">N8N</a>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let particles = [];
        let fallingObjects = [];
        let animationStarted = false;
        
        const config = {
            particleSpacing: 3, // Lower = higher density
            mouseRadius: 120,
            repulsionStrength: 25,
            returnSpeed: 0.08,
            friction: 0.92,
            objectFrequency: 0.015
        };

        window.addEventListener('resize', () => {
            init();
        });

        class Particle {
            constructor(x, y) {
                // Start particles at random screen positions for the "loading" effect
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.destX = x;
                this.destY = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                // Randomized size for organic feel
                this.size = Math.random() * 2.2 + 0.5;
                this.opacity = 0;
            }

            draw() {
                ctx.fillStyle = `rgba(34, 34, 34, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update(obstacles) {
                // Fade in during assembly
                if (this.opacity < 1) this.opacity += 0.01;

                // Return to home force (Magnetic)
                let dx = this.destX - this.x;
                let dy = this.destY - this.y;
                this.vx += dx * config.returnSpeed;
                this.vy += dy * config.returnSpeed;

                // Obstacle repulsion (Magnetic Propulsion)
                obstacles.forEach(obj => {
                    let ox = obj.x - this.x;
                    let oy = obj.y - this.y;
                    let dist = Math.sqrt(ox * ox + oy * oy);
                    if (dist < obj.radius) {
                        let angle = Math.atan2(oy, ox);
                        let force = (obj.radius - dist) / obj.radius;
                        this.vx -= Math.cos(angle) * force * config.repulsionStrength;
                        this.vy -= Math.sin(angle) * force * config.repulsionStrength;
                    }
                });

                this.vx *= config.friction;
                this.vy *= config.friction;
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        class FallingObject {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -100;
                this.vy = Math.random() * 3 + 1.5;
                this.radius = Math.random() * 40 + 30;
                this.color = `rgba(0,0,0,${Math.random() * 0.05 + 0.02})`;
            }

            update() {
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];

            // 1. Draw "K to the K" - LARGER
            ctx.fillStyle = "black";
            ctx.font = "bold 120px 'Segoe UI', Roboto, Arial";
            ctx.textAlign = "center";
            ctx.fillText("K to the K", canvas.width / 2, canvas.height / 2);
            
            // 2. Draw the Button Border (Rectangular)
            const btnW = 200;
            const btnH = 70;
            const btnX = canvas.width / 2 - btnW / 2;
            const btnY = canvas.height * 0.7 - btnH / 2;
            
            ctx.lineWidth = 4;
            ctx.strokeRect(btnX, btnY, btnW, btnH);

            // 3. Draw "N8N" Text inside button
            ctx.font = "bold 45px 'Segoe UI', Roboto, Arial";
            ctx.fillText("N8N", canvas.width / 2, (canvas.height * 0.7) + 15);

            // Sample the pixels
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < canvas.height; y += config.particleSpacing) {
                for (let x = 0; x < canvas.width; x += config.particleSpacing) {
                    const index = (x + y * canvas.width) * 4;
                    if (imageData[index + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Generate falling objects
            if (Math.random() < config.objectFrequency) {
                fallingObjects.push(new FallingObject());
            }

            fallingObjects.forEach((obj, i) => {
                obj.update();
                obj.draw();
                if (obj.y > canvas.height + 100) fallingObjects.splice(i, 1);
            });

            particles.forEach(p => {
                p.update(fallingObjects);
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
