<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f7f9;
            --text-color: #000000;
            --glitch-cyan: #00f2ff;
            --glitch-magenta: #ff00c1;
            --scanline-color: rgba(0, 0, 0, 0.15);
        }

        /* --- CRT / VHS POWER ON LOADER --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            align-items: center; justify-content: center;
        }

        /* The "Light Beam" of a CRT powering on */
        .loader-beam {
            width: 100%; height: 2px;
            background: #fff;
            box-shadow: 0 0 10px #fff;
            transform: scaleX(0);
            animation: beamPowerOn 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        @keyframes beamPowerOn {
            0% { transform: scaleX(0); height: 2px; }
            100% { transform: scaleX(1); height: 2px; }
        }

        /* When loaded, the beam expands vertically to reveal the page */
        .loaded #loader {
            animation: shutterOpen 1.5s cubic-bezier(0.85, 0, 0.15, 1) forwards;
        }

        @keyframes shutterOpen {
            0% { height: 2px; top: 50%; }
            100% { height: 100%; top: 0%; opacity: 0; visibility: hidden; }
        }

        /* --- GLOBAL VHS DISTORTION --- */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Noise_Generated.png');
            opacity: 0.04; /* Very subtle grain */
            z-index: 50;
            pointer-events: none;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        #scanline {
            position: absolute;
            top: -10px; left: 0; width: 100%; height: 15px;
            background: var(--scanline-color);
            z-index: 20; pointer-events: none;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        .container { text-align: center; z-index: 5; }

        /* --- TYPOGRAPHY --- */
        .glitch-text {
            font-weight: 900; text-transform: uppercase;
            letter-spacing: -0.02em; display: flex;
            justify-content: center; align-items: center;
            gap: 0.1em; user-select: none;
        }
        .char { position: relative; display: inline-block; font-size: clamp(3rem, 10vw, 8rem); }
        .char.big-k { font-size: clamp(6rem, 20vw, 16rem); line-height: 0.8; }

        /* --- HIGH SPEED GLITCH --- */
        .char::before, .char::after {
            content: attr(data-char);
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            visibility: hidden; background: transparent;
        }

        .char.active::before, .char:hover::before {
            visibility: visible; left: 8px;
            color: var(--glitch-cyan); z-index: -1;
            animation: glitch-anim 0.06s infinite linear alternate-reverse;
            animation-delay: var(--g-delay);
        }

        .char.active::after, .char:hover::after {
            visibility: visible; left: -8px;
            color: var(--glitch-magenta); z-index: -2;
            animation: glitch-anim-2 0.04s infinite linear alternate;
            animation-delay: calc(var(--g-delay) * 0.5);
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(5% 0 70% 0); transform: translate(-5px, 2px); }
            100% { clip-path: inset(40% 0 10% 0); transform: translate(5px, -2px); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(50% 0 20% 0); transform: translate(5px, 1px); }
            100% { clip-path: inset(10% 0 60% 0); transform: translate(-5px, -1px); }
        }

        /* --- BUTTON WRAPPER --- */
        .button-wrapper { 
            margin-top: 5rem; position: relative; display: inline-block;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .n8n-link {
            display: inline-block; text-decoration: none;
            color: var(--text-color); font-weight: 900;
            font-size: 0.85rem; letter-spacing: 0.4em;
            padding: 18px 55px; border: 2px solid var(--text-color);
            background: var(--bg-color); cursor: pointer;
            position: relative; z-index: 10;
        }
        .button-wrapper:hover { transform: scale(1.1); letter-spacing: 0.5em; }
        .button-wrapper:hover .n8n-link { background: var(--text-color); color: var(--bg-color); }
        
        .btn-glitch-cyan, .btn-glitch-magenta {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid; padding: inherit; font-size: inherit;
            font-weight: inherit; letter-spacing: inherit;
            visibility: hidden; pointer-events: none; z-index: -1;
        }

        .button-wrapper.active .btn-glitch-cyan {
            visibility: visible; color: var(--glitch-cyan); border-color: var(--glitch-cyan);
            left: 10px; animation: glitch-anim 0.05s infinite linear alternate-reverse;
        }
        .button-wrapper.active .btn-glitch-magenta {
            visibility: visible; color: var(--glitch-magenta); border-color: var(--glitch-magenta);
            left: -10px; animation: glitch-anim-2 0.05s infinite linear alternate;
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-beam"></div>
    </div>

    <div id="scanline"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-text" id="glitch-container"></div>
        <div class="button-wrapper" id="n8n-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
            <div class="btn-glitch-cyan">N8N</div>
            <div class="btn-glitch-magenta">N8N</div>
        </div>
    </div>

    <script>
        const text = "K TO THE K";
        const container = document.getElementById('glitch-container');
        const buttonWrapper = document.getElementById('n8n-wrapper');
        const chars = [];

        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char';
            if (char.toUpperCase() === 'K') span.classList.add('big-k');
            
            const randomDelay = (Math.random() * -1).toFixed(2) + 's';
            const randomSpeed = (0.04 + Math.random() * 0.04).toFixed(2) + 's';
            span.style.setProperty('--g-delay', randomDelay);
            span.style.setProperty('--g-speed', randomSpeed);
            
            span.innerText = char === ' ' ? '\u00A0' : char;
            span.setAttribute('data-char', char);
            container.appendChild(span);
            chars.push(span);
        });

        const glitchableObjects = [...chars, buttonWrapper];
        let scanPos = -100;
        const speed = 6; 

        function animateScan() {
            scanPos += speed;
            if (scanPos > window.innerHeight + 100) scanPos = -100;
            const scanline = document.getElementById('scanline');
            if(scanline) scanline.style.top = scanPos + 'px';

            glitchableObjects.forEach(obj => {
                const rect = obj.getBoundingClientRect();
                if (scanPos > rect.top && scanPos < rect.bottom) {
                    obj.classList.add('active');
                } else {
                    obj.classList.remove('active');
                }
            });
            requestAnimationFrame(animateScan);
        }
        animateScan();

        // Reveal page immediately but with a slow shutter animation
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 800); // Beam finishes, then shutter starts
        });
    </script>
</body>
</html>
