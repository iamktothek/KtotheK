<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, points;
        let mouse = new THREE.Vector2();
        let targetRotation = new THREE.Vector2();
        let raycaster = new THREE.Raycaster();
        
        const particleCount = 20000;
        const positions = new Float32Array(particleCount * 3);
        const targets = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        const originalTargets = new Float32Array(particleCount * 3); // Store baseline targets

        let isOverButton = false;
        let buttonParticleIndices = []; // Keep track of N8N particles for glitching

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. Chaotic Scatter
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 50;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 50;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 20;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            // Setup custom shader material for individual particle colors
            const vertexShader = `
                attribute vec3 color;
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = 4.0; // Fixed size
                    gl_Position = projectionMatrix * mvPosition;
                }
            `;

            const fragmentShader = `
                varying vec3 vColor;
                void main() {
                    gl_FragColor = vec4(vColor, 1.0);
                }
            `;

            const material = new THREE.ShaderMaterial({
                uniforms: {},
                vertexShader,
                fragmentShader,
                transparent: true
            });

            // Initialize all colors to black
            const colors = new Float32Array(particleCount * 3);
            for(let i=0; i < particleCount * 3; i+=3) {
                colors[i] = 0; // R
                colors[i+1] = 0; // G
                colors[i+2] = 0; // B
            }
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            points = new THREE.Points(geometry, material);
            scene.add(points);

            // 2. Generate the "K to the K" and "N8N" map
            generateCombinedMap();

            // 3. Assemble Animation
            gsap.to(positions, {
                endArray: targets,
                duration: 4,
                ease: "expo.out",
                onUpdate: () => { points.geometry.attributes.position.needsUpdate = true; },
                onComplete: () => {
                    // Store the baseline formed positions so we can glitch *from* them
                    originalTargets.set(targets);
                }
            });

            // Input Listeners
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onClick);
            window.addEventListener('resize', onWindowResize);
        }

        function generateCombinedMap() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 2000;
            canvas.height = 1000;

            // Fill background (not necessary with white scene, but keeps math sane)
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Draw MAIN TITLE (Top half, Black text)
            ctx.fillStyle = 'black';
            ctx.font = '900 220px sans-serif';
            ctx.fillText("K TO THE K", canvas.width / 2, canvas.height * 0.35);

            // Set up button boundary (white-on-black for sampling)
            ctx.fillStyle = 'white'; // White is the sampling key
            const bX = canvas.width / 2 - 250, bY = canvas.height * 0.7 - 80, bW = 500, bH = 160;
            ctx.fillRect(bX, bY, bW, bH); // White Button background

            // Draw Button Text (Black-on-white)
            ctx.fillStyle = 'black'; // Black text on white button
            ctx.font = '700 100px sans-serif';
            ctx.fillText("N8N", canvas.width / 2, canvas.height * 0.7);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const titleCoords = [];
            const buttonCoords = [];

            // Visible width calculation
            const vWidth = 2 * Math.tan((camera.fov * Math.PI) / 360) * camera.position.z * camera.aspect;
            const scale = (vWidth * 0.7) / canvas.width;

            // Sample pixels
            for (let y = 0; y < canvas.height; y += 3) {
                for (let x = 0; x < canvas.width; x += 3) {
                    const i = (y * canvas.width + x) * 4;
                    
                    // Main Title (Black pixels in the upper area)
                    if (y < canvas.height * 0.5 && imageData[i] < 128) {
                        titleCoords.push({
                            x: (x - canvas.width / 2) * scale,
                            y: (canvas.height / 2 - y) * scale
                        });
                    }
                    // Button (White pixels in the lower area)
                    if (y > canvas.height * 0.5 && imageData[i] > 128) {
                        buttonCoords.push({
                            x: (x - canvas.width / 2) * scale,
                            y: (canvas.height / 2 - y) * scale
                        });
                    }
                }
            }

            // Distribute particles to target coords
            const colors = points.geometry.attributes.color.array;
            
            for (let i = 0; i < particleCount; i++) {
                if (i < titleCoords.length) {
                    // Particles mapping to the main title (BLACK)
                    targets[i * 3] = titleCoords[i].x;
                    targets[i * 3 + 1] = titleCoords[i].y;
                    // Colors are initialized black, no need to update
                } else {
                    // Particles mapping to the inverted button (WHITE)
                    const bTarget = buttonCoords[i % buttonCoords.length];
                    targets[i * 3] = bTarget.x;
                    targets[i * 3 + 1] = bTarget.y;
                    
                    // Set color to pure white (1,1,1)
                    colors[i * 3] = 1;
                    colors[i * 3 + 1] = 1;
                    colors[i * 3 + 2] = 1;
                    
                    buttonParticleIndices.push(i); // Mark this particle for glitching
                }
                targets[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
            }
            points.geometry.attributes.color.needsUpdate = true;
        }

        function onMouseMove(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            // Limit the main rotation bounds
            targetRotation.y = mouse.x * 0.4;
            targetRotation.x = -mouse.y * 0.4;

            // Raycasting check for the button area (roughly y < 0)
            if (mouse.y < -0.15 && mouse.y > -0.7 && Math.abs(mouse.x) < 0.25) {
                if (!isOverButton) {
                    document.body.style.cursor = 'pointer'; // Button hover cursor
                    isOverButton = true;
                }
            } else {
                if (isOverButton) {
                    document.body.style.cursor = 'default'; // Regular cursor
                    isOverButton = false;
                    
                    // Stop glitching by setting targets back to original
                    for (let i = 0; i < buttonParticleIndices.length; i++) {
                        const index = buttonParticleIndices[i];
                        targets[index * 3] = originalTargets[index * 3];
                        targets[index * 3 + 1] = originalTargets[index * 3 + 1];
                    }
                }
            }
        }

        function onClick() {
            if (isOverButton) {
                window.location.href = "https://n8n.ktothek.com";
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Smooth logo parallax tilt
            points.rotation.y += (targetRotation.y - points.rotation.y) * 0.05;
            points.rotation.x += (targetRotation.x - points.rotation.x) * 0.05;

            // Active Glitch/Jitter logic when hovered
            if (isOverButton && originalTargets[0] !== 0) {
                for (let i = 0; i < buttonParticleIndices.length; i++) {
                    const index = buttonParticleIndices[i];
                    // Add random high-frequency jitter (glitch) to target x/y
                    targets[index * 3] = originalTargets[index * 3] + (Math.random() - 0.5) * 0.15;
                    targets[index * 3 + 1] = originalTargets[index * 3 + 1] + (Math.random() - 0.5) * 0.15;
                }
            }

            // Lerp all particles toward their (potentially jittering) targets
            const pos = points.geometry.attributes.position.array;
            for(let i=0; i<particleCount*3; i++) {
                pos[i] += (targets[i] - pos[i]) * 0.06;
            }
            points.geometry.attributes.position.needsUpdate = true;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
