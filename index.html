<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .n8n-button {
            margin-top: 300px; 
            pointer-events: auto;
            padding: 16px 40px;
            background: #000;
            color: #fff;
            text-decoration: none;
            letter-spacing: 0.3em;
            font-weight: 900;
            font-size: 13px;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .n8n-button:hover {
            transform: translateY(-3px);
            background: #333;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <a href="https://n8n.ktothek.com" class="n8n-button">N8N</a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        let scene, camera, renderer, textGroup;
        const mouse = new THREE.Vector2();

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 60;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 1. THE CHROME MATCAP 
            // This is a "Liquid Chrome" texture captured in a sphere. 
            // It guarantees the metal look regardless of scene lighting.
            const loader = new THREE.TextureLoader();
            const chromeTexture = loader.load('https://raw.githubusercontent.com/nidorx/matcaps/master/1024/2E3236_96A0A7_717981_545D65-1024px.png');

            // 2. LOAD FONT & MANUALLY SPACE LETTERS
            const fontLoader = new FontLoader();
            fontLoader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                
                textGroup = new THREE.Group();
                const str = "K to the K";
                const letterSpacing = 4.5; // Adjusted spacing
                const totalWidth = (str.length - 1) * letterSpacing;

                const material = new THREE.MeshMatcapMaterial({
                    matcap: chromeTexture,
                    color: 0xffffff
                });

                str.split('').forEach((char, i) => {
                    if (char === ' ') return; // Skip spaces but maintain index

                    const geometry = new TextGeometry(char, {
                        font: font,
                        size: 6,
                        height: 1.5,
                        curveSegments: 32,
                        bevelEnabled: true,
                        bevelThickness: 1.8,
                        bevelSize: 1.2,
                        bevelSegments: 15
                    });
                    geometry.center();

                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.x = (i * letterSpacing) - (totalWidth / 2) + 6; 
                    textGroup.add(mesh);
                });

                scene.add(textGroup);
                animate();
            });

            // 3. INTERACTION
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (textGroup) {
                // Interaction: Group tilt
                textGroup.rotation.y += (mouse.x * 0.4 - textGroup.rotation.y) * 0.05;
                textGroup.rotation.x += (-mouse.y * 0.3 - textGroup.rotation.x) * 0.05;

                // Individual letter "Balloon" float
                textGroup.children.forEach((child, i) => {
                    child.position.y = Math.sin(time + i * 0.3) * 1.5;
                    child.rotation.z = Math.sin(time * 0.5 + i) * 0.1;
                });
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
