<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: white;
        }

        /* The Vignette Effect */
        #vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 100%);
            z-index: 10;
        }

        canvas {
            display: block;
        }

        /* Hidden link for SEO and accessibility */
        #n8n-link {
            position: absolute;
            left: 50%;
            top: 65%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 60px;
            z-index: 20;
            cursor: pointer;
            text-decoration: none;
            color: transparent;
        }
    </style>
</head>
<body>

    <div id="vignette"></div>
    <a href="https://n8n.ktothek.com" id="n8n-link">N8N</a>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let fallingObjects = [];
        
        const config = {
            particleSpacing: 4,
            mouseRadius: 100,
            repulsionStrength: 5,
            returnSpeed: 0.1,
            friction: 0.9,
            objectFrequency: 0.02
        };

        window.addEventListener('resize', init);

        class Particle {
            constructor(x, y) {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.destX = x;
                this.destY = y;
                this.vx = 0;
                this.vy = 0;
                this.size = 1.5;
            }

            draw() {
                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            update(obstacles) {
                // Return to home force
                let dx = this.destX - this.x;
                let dy = this.destY - this.y;
                this.vx += dx * config.returnSpeed;
                this.vy += dy * config.returnSpeed;

                // Obstacle repulsion
                obstacles.forEach(obj => {
                    let ox = obj.x - this.x;
                    let oy = obj.y - this.y;
                    let dist = Math.sqrt(ox * ox + oy * oy);
                    if (dist < obj.radius) {
                        let angle = Math.atan2(oy, ox);
                        let force = (obj.radius - dist) / obj.radius;
                        this.vx -= Math.cos(angle) * force * 20;
                        this.vy -= Math.sin(angle) * force * 20;
                    }
                });

                this.vx *= config.friction;
                this.vy *= config.friction;
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        class FallingObject {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.vy = Math.random() * 2 + 1;
                this.radius = Math.random() * 30 + 20;
                this.color = `rgba(0,0,0,${Math.random() * 0.1 + 0.05})`;
            }

            update() {
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];

            // Draw text hiddenly to sample pixels
            ctx.fillStyle = "black";
            ctx.font = "bold 80px Arial";
            ctx.textAlign = "center";
            ctx.fillText("K to the K", canvas.width / 2, canvas.height / 2);
            
            ctx.font = "bold 40px Arial";
            ctx.fillText("N8N", canvas.width / 2, canvas.height * 0.65);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < canvas.height; y += config.particleSpacing) {
                for (let x = 0; x < canvas.width; x += config.particleSpacing) {
                    const index = (x + y * canvas.width) * 4;
                    if (imageData[index + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < config.objectFrequency) {
                fallingObjects.push(new FallingObject());
            }

            fallingObjects.forEach((obj, i) => {
                obj.update();
                obj.draw();
                if (obj.y > canvas.height + 50) fallingObjects.splice(i, 1);
            });

            particles.forEach(p => {
                p.update(fallingObjects);
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
