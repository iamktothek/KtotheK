<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- UPDATED: LIGHT GRAY BACKGROUND --- */
            --bg-color: #f7f7f9;
            --text-color: #000000;
            --glitch-cyan: #00f2ff;
            --glitch-magenta: #ff00c1;
            --scanline-color: rgba(0, 0, 0, 0.15);
        }

        /* --- PRELOADER (Deliberately Slow) --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .loader-line {
            width: 0%; height: 2px;
            background: var(--text-color);
            animation: loadProgress 3s ease-in-out forwards;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .loaded #loader { transform: translateY(-100%); }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            opacity: 0;
            transition: opacity 1s ease;
        }

        body.loaded { opacity: 1; }

        /* --- SCANLINE --- */
        #scanline {
            position: absolute;
            top: -10px; left: 0; width: 100%; height: 8px; /* Slightly thicker */
            background: var(--scanline-color);
            z-index: 20;
            pointer-events: none;
        }

        .container { text-align: center; z-index: 5; }

        /* --- TYPOGRAPHY --- */
        .glitch-text {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.1em;
            user-select: none;
        }

        .char { 
            position: relative; 
            display: inline-block;
            font-size: clamp(3rem, 10vw, 8rem);
        }

        .char.big-k {
            font-size: clamp(6rem, 20vw, 16rem);
            line-height: 0.8;
        }

        /* --- RANDOMIZED GLITCH LOGIC --- */
        /* The base "ghost" layers */
        .char::before, .char::after {
            content: attr(data-char);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            visibility: hidden;
            background: transparent;
        }

        /* Glitch trigger (Scanline or Hover) */
        .char.active::before, .char:hover::before {
            visibility: visible;
            left: 4px;
            color: var(--glitch-cyan);
            z-index: -1;
            /* JS provides unique --g-delay and --g-speed variables */
            animation: glitch-anim var(--g-speed) infinite linear alternate-reverse;
            animation-delay: var(--g-delay);
            opacity: 0.8;
        }

        .char.active::after, .char:hover::after {
            visibility: visible;
            left: -4px;
            color: var(--glitch-magenta);
            z-index: -2;
            animation: glitch-anim-2 var(--g-speed) infinite linear alternate;
            animation-delay: calc(var(--g-delay) * 0.5); /* Slightly offset second layer */
            opacity: 0.8;
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(-2px, 2px); }
            100% { clip-path: inset(40% 0 20% 0); transform: translate(2px, -2px); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(30% 0 30% 0); transform: translate(2px, 2px); }
            100% { clip-path: inset(10% 0 70% 0); transform: translate(-2px, -2px); }
        }

        /* --- GLITCHING BUTTON --- */
        .button-wrapper { margin-top: 5rem; }

        .n8n-link {
            display: inline-block;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 0.4em;
            padding: 16px 50px;
            border: 2px solid var(--text-color);
            background: transparent;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; /* Essential for ::before layering */
        }

        /* Standard Button Hover */
        .n8n-link:hover {
            background: var(--text-color);
            color: var(--bg-color);
            transform: scale(1.15);
            letter-spacing: 0.6em;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        /* Standard Button Active (Click) */
        .n8n-link:active {
            transform: scale(0.95);
            background: #111;
        }

        /* THE BUTTON GLITCH ghost layers */
        .n8n-link::before, .n8n-link::after {
            content: "N8N";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            font-size: inherit; font-weight: inherit;
            letter-spacing: inherit;
            padding: inherit;
        }

        /* Button Glitch Trigger (Scanline activated only) */
        .n8n-link.active::before {
            visibility: visible;
            left: 3px;
            color: var(--glitch-cyan);
            z-index: -1;
            animation: glitch-anim 0.25s infinite linear alternate-reverse;
            animation-delay: -0.1s;
        }

        .n8n-link.active::after {
            visibility: visible;
            left: -3px;
            color: var(--glitch-magenta);
            z-index: -2;
            animation: glitch-anim-2 0.35s infinite linear alternate;
            animation-delay: -0.2s;
        }

        /* BG Grid Dots */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-line"></div>
    </div>

    <div id="scanline"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-text" id="glitch-container"></div>
        <div class="button-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link" id="n8n-button">N8N</a>
        </div>
    </div>

    <script>
        const text = "K TO THE K";
        const container = document.getElementById('glitch-container');
        const button = document.getElementById('n8n-button');
        const chars = [];

        // Build characters with random glitch seeds
        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char';
            if (char.toUpperCase() === 'K') span.classList.add('big-k');
            
            // Generate unique glitch seed for each letter
            const randomDelay = (Math.random() * -2).toFixed(2) + 's'; // Delay between 0 and -2s
            const randomSpeed = (0.2 + Math.random() * 0.15).toFixed(2) + 's'; // Speed between 0.2s and 0.35s
            
            // Set as CSS variables on the element
            span.style.setProperty('--g-delay', randomDelay);
            span.style.setProperty('--g-speed', randomSpeed);
            
            span.innerText = char === ' ' ? '\u00A0' : char;
            span.setAttribute('data-char', char);
            container.appendChild(span);
            chars.push(span);
        });

        // Add the button to the objects that the scanline can activate
        const glitchableObjects = [...chars, button];

        // Scanline movement
        let scanPos = -100;
        const speed = 3; 

        function animateScan() {
            scanPos += speed;
            if (scanPos > window.innerHeight + 100) scanPos = -100;
            
            const scanline = document.getElementById('scanline');
            scanline.style.top = scanPos + 'px';

            glitchableObjects.forEach(obj => {
                const rect = obj.getBoundingClientRect();
                if (scanPos > rect.top && scanPos < rect.bottom) {
                    obj.classList.add('active');
                } else {
                    obj.classList.remove('active');
                }
            });

            requestAnimationFrame(animateScan);
        }

        animateScan();

        // Delay main page reveal until 3s preloader animation finishes
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 3200); 
        });
    </script>
</body>
</html>
