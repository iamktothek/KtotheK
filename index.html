<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K | Magnetic Flow</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
        
        /* The Vignette Effect */
        #vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
            background: radial-gradient(circle, rgba(255,255,255,0) 50%, rgba(0,0,0,0.05) 100%);
        }

        #canvas-container { position: fixed; inset: 0; z-index: 1; }
        
        /* Hidden link for SEO/Accessibility since the button is rendered in 3D */
        .hidden-link { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="vignette"></div>
    <div id="canvas-container"></div>
    <a href="https://n8n.ktothek.com" class="hidden-link">n8n</a>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        let scene, camera, renderer, particles;
        const particleData = [];
        const fallingObjects = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        init();

        async function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 60;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const loader = new FontLoader();
            loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                createParticleText(font, "K to the K", 0, 5);
                createParticleText(font, "N8N", -15, 3, true); // The button
                setupFallingObjects();
                animate();
            });

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            window.addEventListener('click', (e) => {
                // Check if clicking near the N8N text area
                if (Math.abs(mouse.x) < 0.2 && mouse.y < -0.15 && mouse.y > -0.35) {
                    window.location.href = "https://n8n.ktothek.com";
                }
            });
        }

        function createParticleText(font, text, yOffset, size, isButton = false) {
            const geo = new TextGeometry(text, { font, size, height: 0, curveSegments: 4 });
            geo.center();
            
            // Sample points from the geometry
            const posAttr = geo.getAttribute('position');
            const step = isButton ? 2 : 1; // density
            
            for (let i = 0; i < posAttr.count; i += step) {
                const x = posAttr.getX(i);
                const y = posAttr.getY(i) + yOffset;
                const z = posAttr.getZ(i);

                particleData.push({
                    home: new THREE.Vector3(x, y, z),
                    curr: new THREE.Vector3(x, y, z),
                    vel: new THREE.Vector3(),
                    color: isButton ? new THREE.Color(0x333333) : new THREE.Color(0x000000)
                });
            }

            const pointsGeo = new THREE.BufferGeometry();
            updateGeometry(pointsGeo);

            const mat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true });
            particles = new THREE.Points(pointsGeo, mat);
            scene.add(particles);
        }

        function setupFallingObjects() {
            const geometries = [
                new THREE.IcosahedronGeometry(2),
                new THREE.BoxGeometry(2, 2, 2),
                new THREE.TorusGeometry(1.5, 0.5, 8, 16)
            ];
            
            for (let i = 0; i < 5; i++) {
                const mesh = new THREE.Mesh(
                    geometries[Math.floor(Math.random() * geometries.length)],
                    new THREE.MeshBasicMaterial({ color: 0xeeeeee, wireframe: true })
                );
                resetObject(mesh);
                scene.add(mesh);
                fallingObjects.push(mesh);
            }
        }

        function resetObject(obj) {
            obj.position.y = 40 + Math.random() * 40;
            obj.position.x = (Math.random() - 0.5) * 60;
            obj.position.z = (Math.random() - 0.5) * 10;
            obj.userData.speed = 0.2 + Math.random() * 0.3;
        }

        function updateGeometry(geo) {
            const positions = new Float32Array(particleData.length * 3);
            const colors = new Float32Array(particleData.length * 3);
            particleData.forEach((p, i) => {
                positions[i * 3] = p.curr.x;
                positions[i * 3 + 1] = p.curr.y;
                positions[i * 3 + 2] = p.curr.z;
                colors[i * 3] = p.color.r;
                colors[i * 3 + 1] = p.color.g;
                colors[i * 3 + 2] = p.color.b;
            });
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        }

        function animate() {
            requestAnimationFrame(animate);
            
            fallingObjects.forEach(obj => {
                obj.position.y -= obj.userData.speed;
                obj.rotation.x += 0.01;
                obj.rotation.z += 0.01;
                if (obj.position.y < -40) resetObject(obj);

                // Particle Interaction Logic
                particleData.forEach(p => {
                    const dist = p.curr.distanceTo(obj.position);
                    if (dist < 6) {
                        const dir = new THREE.Vector3().subVectors(p.curr, obj.position).normalize();
                        const force = (6 - dist) * 0.5;
                        p.vel.add(dir.multiplyScalar(force));
                    }
                });
            });

            // Physics Update
            particleData.forEach(p => {
                // Spring back to home
                const spring = new THREE.Vector3().subVectors(p.home, p.curr).multiplyScalar(0.05);
                p.vel.add(spring);
                p.vel.multiplyScalar(0.9); // Dampening
                p.curr.add(p.vel);
            });

            if (particles) updateGeometry(particles.geometry);
            
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
