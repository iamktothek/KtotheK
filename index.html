<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; cursor: default; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        let particles = [];
        const mouse = { x: -1000, y: -1000 };
        let isOverButton = false;

        class Particle {
            constructor(tx, ty, isBtn) {
                // Wide chaotic scatter
                this.x = (Math.random() - 0.5) * (window.innerWidth * 6) + (window.innerWidth / 2);
                this.y = (Math.random() - 0.5) * (window.innerHeight * 6) + (window.innerHeight / 2);
                
                this.tx = tx;
                this.ty = ty;
                this.isBtn = isBtn;
                this.size = isBtn ? 1.5 : 2; // Slightly thicker for bubbly look
                
                // Cinematic slow speed
                this.ease = 0.008 + (Math.random() * 0.006); 
                this.friction = 0.92;
                this.vx = 0;
                this.vy = 0;
            }

            update() {
                let targetX = this.tx;
                let targetY = this.ty;

                if (!this.isBtn) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < 2500) { 
                        const dist = Math.sqrt(distSq);
                        const force = (50 - dist) / 50;
                        targetX += (dx / dist) * force * 15; 
                        targetY += (dy / dist) * force * 15;
                    }
                }

                if (this.isBtn && isOverButton) {
                    targetX += (Math.random() - 0.5) * 6;
                    targetY += (Math.random() - 0.5) * 6;
                }

                this.vx += (targetX - this.x) * this.ease;
                this.vy += (targetY - this.y) * this.ease;
                this.vx *= this.friction;
                this.vy *= this.friction;

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = '#000000';
                // Drawing rounded-style rects (particles)
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            resize();
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = 2000;
            tempCanvas.height = 1000;

            tCtx.fillStyle = 'white';
            tCtx.fillRect(0, 0, 2000, 1000);
            
            tCtx.fillStyle = 'black';
            // Using Rounded Fonts for a "Bubbly/Futuristic" look
            tCtx.font = 'bold 240px "Varela Round", "Arial Rounded MT Bold", Helvetica, sans-serif'; 
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            
            // Draw text: K to the K
            tCtx.fillText("K to the K", 1000, 400);

            // Futuristic Pill-shaped Button
            const btnW = 480;
            const btnH = 150;
            const btnX = 1000 - (btnW / 2);
            const btnY = 600;
            
            // Draw a rounded button box
            tCtx.beginPath();
            tCtx.roundRect(btnX, btnY, btnW, btnH, 75); // Native pill shape
            tCtx.fill();

            tCtx.fillStyle = 'white';
            tCtx.font = 'bold 80px Helvetica, sans-serif'; 
            tCtx.fillText("N8N", 1000, 680);

            const data = tCtx.getImageData(0, 0, 2000, 1000).data;
            
            // Reduced density (step 6)
            const step = 6; 
            const points = [];

            for (let y = 0; y < 1000; y += step) {
                for (let x = 0; x < 2000; x += step) {
                    const i = (y * 2000 + x) * 4;
                    if (data[i] < 200) {
                        points.push({
                            x: x,
                            y: y,
                            isBtn: y > 520
                        });
                    }
                }
            }

            const scale = (width * 0.7) / 2000; 
            const offsetX = (width - (2000 * scale)) / 2;
            const offsetY = (height - (1000 * scale)) / 2;

            particles = points.map(p => new Particle(
                p.x * scale + offsetX, 
                p.y * scale + offsetY, 
                p.isBtn
            ));
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;

            const scale = (width * 0.7) / 2000;
            const btnLeft = (760 * scale) + (width - (2000 * scale)) / 2;
            const btnRight = (1240 * scale) + (width - (2000 * scale)) / 2;
            const btnTop = (600 * scale) + (height - (1000 * scale)) / 2;
            const btnBottom = (750 * scale) + (height - (1000 * scale)) / 2;

            isOverButton = (mouse.x > btnLeft && mouse.x < btnRight && mouse.y > btnTop && mouse.y < btnBottom);
            canvas.style.cursor = isOverButton ? 'pointer' : 'default';
        });

        window.addEventListener('click', () => {
            if (isOverButton) window.location.href = "https://n8n.ktothek.com";
        });

        window.addEventListener('resize', () => {
            resize();
            init(); 
        });

        init();
        animate();
    </script>
</body>
</html>
