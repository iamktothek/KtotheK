<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>K to the K</title>
                <style>
                        * {
                                    margin: 0;
                                                padding: 0;
                                                            box-sizing: border-box;
                                                                    }

                                                                            body {
                                                                                        font-family: 'Arial', sans-serif;
                                                                                                    background-color: #000;
                                                                                                                color: #fff;
                                                                                                                            overflow-x: hidden;
                                                                                                                                        height: 100vh;
                                                                                                                                                    display: flex;
                                                                                                                                                                flex-direction: column;
                                                                                                                                                                            justify-content: center;
                                                                                                                                                                                        align-items: center;
                                                                                                                                                                                                    position: relative;
                                                                                                                                                                                                            }

                                                                                                                                                                                                                    #particles-js {
                                                                                                                                                                                                                                position: absolute;
                                                                                                                                                                                                                                            width: 100%;
                                                                                                                                                                                                                                                        height: 100%;
                                                                                                                                                                                                                                                                    z-index: -1;
                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                    .container {
                                                                                                                                                                                                                                                                                                text-align: center;
                                                                                                                                                                                                                                                                                                            z-index: 1;
                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                            h1 {
                                                                                                                                                                                                                                                                                                                                        font-size: 4rem;
                                                                                                                                                                                                                                                                                                                                                    margin-bottom: 2rem;
                                                                                                                                                                                                                                                                                                                                                                opacity: 0;
                                                                                                                                                                                                                                                                                                                                                                            animation: fadeIn 2s ease-in forwards;
                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                            @keyframes fadeIn {
                                                                                                                                                                                                                                                                                                                                                                                                        from { opacity: 0; transform: translateY(20px); }
                                                                                                                                                                                                                                                                                                                                                                                                                    to { opacity: 1; transform: translateY(0); }
                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                    .n8n-button {
                                                                                                                                                                                                                                                                                                                                                                                                                                                padding: 12px 24px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                            background: transparent;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        color: #fff;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    border: 1px solid #fff;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                border-radius: 4px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            font-size: 1rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        cursor: pointer;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    text-decoration: none;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                display: inline-block;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            opacity: 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        animation: fadeIn 2s ease-in 0.5s forwards;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    transition: all 0.3s ease;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    .n8n-button:hover {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                background: #fff;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            color: #000;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .content {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        max-width: 800px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    margin: 2rem auto;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                padding: 0 1rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            opacity: 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        animation: fadeIn 2s ease-in 1s forwards;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .scroll-text {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    font-size: 1.5rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                margin-top: 2rem;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            transition: transform 0.3s ease, opacity 0.3s ease;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div id="particles-js"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="container">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <h1>K to the K</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <a href="https://n8n.ktothek.com" class="n8n-button">n8n</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="content">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p class="scroll-text">Scroll down to see the effect.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <script src="script.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </html>
