<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .ui-overlay {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .n8n-button {
            margin-top: 250px; /* Space for 3D text */
            pointer-events: auto;
            padding: 16px 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            text-decoration: none;
            letter-spacing: 0.4em;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .n8n-button:hover {
            background: white;
            color: black;
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-overlay">
        <a href="https://n8n.ktothek.com" class="n8n-button">N8N</a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        let scene, camera, renderer, textMesh, pmremGenerator;
        let mouse = { x: 0, y: 0 };
        let targetRotation = { x: 0, y: 0 };

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 60;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 1. Setup Environment Map (The Chrome Secret)
            // We create a procedural environment instead of loading a heavy image
            const rt = new THREE.WebGLCubeRenderTarget(256);
            const cubeCamera = new THREE.CubeCamera(1, 1000, rt);
            
            // Create a colorful animated background sphere for reflections
            const bgGeo = new THREE.SphereGeometry(100, 64, 64);
            const bgMat = new THREE.MeshBasicMaterial({
                side: THREE.BackSide,
                color: 0x111111
            });
            const bgMesh = new THREE.Mesh(bgGeo, bgMat);
            scene.add(bgMesh);

            // Add dynamic light orbs for reflection
            const orb1 = new THREE.Mesh(new THREE.SphereGeometry(5), new THREE.MeshBasicMaterial({color: 0x0077ff}));
            const orb2 = new THREE.Mesh(new THREE.SphereGeometry(8), new THREE.MeshBasicMaterial({color: 0xff0055}));
            orb1.position.set(20, 10, -20);
            orb2.position.set(-20, -10, -20);
            scene.add(orb1, orb2);

            // 2. Load Font and Create Chrome Text
            const loader = new FontLoader();
            loader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                const geometry = new TextGeometry('K to the K', {
                    font: font,
                    size: 7,
                    height: 2,
                    curveSegments: 20,
                    bevelEnabled: true,
                    bevelThickness: 0.5,
                    bevelSize: 0.3,
                    bevelOffset: 0,
                    bevelSegments: 10
                });
                geometry.center();

                const material = new THREE.MeshPhysicalMaterial({
                    color: 0xffffff,
                    metalness: 1,
                    roughness: 0.05,
                    reflectivity: 1,
                    envMap: rt.texture,
                    envMapIntensity: 2.5,
                    clearcoat: 1,
                    clearcoatRoughness: 0.1
                });

                textMesh = new THREE.Mesh(geometry, material);
                scene.add(textMesh);
                animate();
            });

            // 3. Lights
            const mainLight = new THREE.DirectionalLight(0xffffff, 2);
            mainLight.position.set(10, 10, 20);
            scene.add(mainLight);

            // 4. Interaction
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                targetRotation.y = mouse.x * 0.3;
                targetRotation.x = mouse.y * 0.2;
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (textMesh) {
                // Smoothly follow mouse
                textMesh.rotation.y += (targetRotation.y - textMesh.rotation.y) * 0.05;
                textMesh.rotation.x += (targetRotation.x - textMesh.rotation.x) * 0.05;
                
                // Subtle floating wobble
                textMesh.position.y = Math.sin(time) * 0.5;
            }

            // Animate reflection "lights" in the background
            scene.children.forEach(child => {
                if (child.isMesh && child !== textMesh) {
                    child.position.x = Math.sin(time * 0.5 + child.id) * 30;
                    child.position.y = Math.cos(time * 0.3 + child.id) * 20;
                }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
