<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f7f9;
            --text-color: #000000;
            --glitch-cyan: #00f2ff;
            --glitch-magenta: #ff00c1;
            --scanline-color: rgba(0, 0, 0, 0.15);
        }

        /* --- THE BOOT SEQUENCE (Black Screen) --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000000;
            z-index: 9999;
            display: flex;
            align-items: center; justify-content: center;
            opacity: 1;
            transition: opacity 1.5s ease-in-out;
        }

        .loader-beam {
            width: 0%; height: 2px;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            animation: beamExpand 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes beamExpand {
            0% { width: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { width: 100%; opacity: 1; }
        }

        /* Classes controlled by JS */
        .hide-loader { opacity: 0 !important; pointer-events: none; }

        /* --- VHS OVERLAY --- */
        .vhs-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.04));
            background-size: 100% 4px, 4px 100%;
            z-index: 40;
            pointer-events: none;
            opacity: 0.2;
            animation: vhs-flicker 0.1s infinite;
        }

        @keyframes vhs-flicker {
            0% { opacity: 0.15; }
            50% { opacity: 0.2; }
            100% { opacity: 0.18; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        /* --- HEAVY SCANLINE --- */
        #scanline {
            position: absolute;
            top: -20px; left: 0; width: 100%; height: 30px; /* Thicker for more impact */
            background: var(--scanline-color);
            z-index: 20; pointer-events: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.08);
        }

        .container { text-align: center; z-index: 5; }

        .glitch-text {
            font-weight: 900; text-transform: uppercase;
            letter-spacing: -0.02em; display: flex;
            justify-content: center; align-items: center;
            gap: 0.1em; user-select: none;
        }
        .char { position: relative; display: inline-block; font-size: clamp(3rem, 10vw, 8rem); }
        .char.big-k { font-size: clamp(6rem, 20vw, 16rem); line-height: 0.8; }

        /* --- GLITCH --- */
        .char::before, .char::after {
            content: attr(data-char);
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            visibility: hidden; background: transparent;
        }
        .char.active::before, .char:hover::before {
            visibility: visible; left: 6px; color: var(--glitch-cyan); z-index: -1;
            animation: glitch-anim 0.25s infinite linear alternate-reverse;
            animation-delay: var(--g-delay);
        }
        .char.active::after, .char:hover::after {
            visibility: visible; left: -6px; color: var(--glitch-magenta); z-index: -2;
            animation: glitch-anim-2 0.3s infinite linear alternate;
            animation-delay: calc(var(--g-delay) * 0.5);
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(-3px, 2px); }
            100% { clip-path: inset(30% 0 20% 0); transform: translate(3px, -2px); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(30% 0 30% 0); transform: translate(3px, 2px); }
            100% { clip-path: inset(10% 0 70% 0); transform: translate(-3px, -2px); }
        }

        /* --- THE BUTTON SNAP-BACK --- */
        .button-wrapper { 
            margin-top: 5rem; 
            position: relative; 
            display: inline-block;
            /* Extra springy snap-back */
            transition: transform 0.8s cubic-bezier(0.5, 1.7, 0.5, 1);
            will-change: transform;
        }

        /* The physical push downwards */
        .button-wrapper.active {
            transform: translateY(20px) scale(0.96);
            transition: transform 0.15s ease-out; /* Fast descent */
        }

        .n8n-link {
            display: inline-block; text-decoration: none;
            color: var(--text-color); font-weight: 900;
            font-size: 0.85rem; letter-spacing: 0.4em;
            padding: 20px 60px; border: 3px solid var(--text-color);
            background: var(--bg-color); cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }

        .button-wrapper:hover .n8n-link {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-beam"></div>
    </div>

    <div class="vhs-overlay"></div>
    <div id="scanline"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-text" id="glitch-container"></div>
        <div class="button-wrapper" id="n8n-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
        </div>
    </div>

    <script>
        const text = "K TO THE K";
        const container = document.getElementById('glitch-container');
        const buttonWrapper = document.getElementById('n8n-wrapper');
        const loader = document.getElementById('loader');
        const chars = [];

        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char';
            if (char.toUpperCase() === 'K') span.classList.add('big-k');
            const randomDelay = (Math.random() * -1).toFixed(2) + 's';
            const randomSpeed = (0.2 + Math.random() * 0.1).toFixed(2) + 's';
            span.style.setProperty('--g-delay', randomDelay);
            span.style.setProperty('--g-speed', randomSpeed);
            span.innerText = char === ' ' ? '\u00A0' : char;
            span.setAttribute('data-char', char);
            container.appendChild(span);
            chars.push(span);
        });

        const interactableObjects = [...chars, buttonWrapper];
        let scanPos = -150;
        const speed = 2.5; // Slower, heavier scanline

        function animateScan() {
            scanPos += speed;
            if (scanPos > window.innerHeight + 150) scanPos = -150;
            const scanline = document.getElementById('scanline');
            if(scanline) scanline.style.top = scanPos + 'px';

            interactableObjects.forEach(obj => {
                const rect = obj.getBoundingClientRect();
                if (scanPos > rect.top && scanPos < rect.bottom) {
                    obj.classList.add('active');
                } else {
                    obj.classList.remove('active');
                }
            });
            requestAnimationFrame(animateScan);
        }

        // Start animation immediately
        animateScan();

        // Reveal Logic: Force the black screen to stay until the beam is "done"
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                loader.classList.add('hide-loader');
            }, 1500); // 1.5 seconds of black + beam before fade-out
        });
    </script>
</body>
</html>
