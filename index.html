<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K to the K</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; }
  body { background:#000; overflow:hidden; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; }
  canvas { position:fixed; top:0; left:0; z-index:1; }
  .ui-container {
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .button-ui {
    margin-top:20px;
    padding:12px 32px;
    border:2px solid white;
    border-radius:8px;
    color:white;
    text-decoration:none;
    font-size:1.2rem;
    text-align:center;
  }
</style>
</head>
<body>

<div class="ui-container">
  <div id="logo-text">K to the K</div>
  <a href="https://n8n.ktothek.com" class="button-ui">N8N</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 20;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000);
document.body.appendChild(renderer.domElement);

const particleCount = 1500; // total particles for both text and button
const positions = new Float32Array(particleCount*3);
const targets = new Float32Array(particleCount*3);
const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

// particle material
const canvas = document.createElement('canvas');
canvas.width = 64; canvas.height = 64;
const ctx = canvas.getContext('2d');
const grad = ctx.createRadialGradient(32,32,2,32,32,32);
grad.addColorStop(0,'#ffffff');
grad.addColorStop(1,'transparent');
ctx.fillStyle = grad;
ctx.fillRect(0,0,64,64);
const texture = new THREE.CanvasTexture(canvas);

const material = new THREE.PointsMaterial({size:0.2, map:texture, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending});
const particles = new THREE.Points(geometry, material);
scene.add(particles);

// --- random start positions ---
for(let i=0;i<particleCount;i++){
  positions[i*3] = (Math.random()-0.5)*40;
  positions[i*3+1] = (Math.random()-0.5)*40;
  positions[i*3+2] = (Math.random()-0.5)*40;
}

// --- generate particle targets for text and button ---
const offCanvas = document.createElement('canvas');
offCanvas.width = 800; offCanvas.height = 200;
const offCtx = offCanvas.getContext('2d');
offCtx.fillStyle='white';
offCtx.textAlign='center';
offCtx.textBaseline='middle';

// first text: logo
offCtx.font='bold 80px sans-serif';
offCtx.fillText('K to the K',400,60);

// second text: button
offCtx.font='bold 40px sans-serif';
offCtx.fillText('N8N',400,140);

const imageData = offCtx.getImageData(0,0,800,200).data;
const pixelCoords = [];
for(let y=0;y<200;y+=2){
  for(let x=0;x<800;x+=2){
    let i = (y*800 + x)*4;
    if(imageData[i]>128) pixelCoords.push([x,y]);
  }
}

// distribute particles to pixel coordinates
for(let i=0;i<particleCount;i++){
  const idx = Math.floor(i/pixelCoords.length * pixelCoords.length);
  const [x,y] = pixelCoords[idx % pixelCoords.length];
  targets[i*3] = (x-400)/20;         // scale and center
  targets[i*3+1] = (100-y)/20;
  targets[i*3+2] = 0;
}

// --- animation ---
let morphProgress = 0;
function animate(){
  requestAnimationFrame(animate);
  morphProgress += 0.02;
  for(let i=0;i<particleCount;i++){
    positions[i*3] += (targets[i*3]-positions[i*3])*0.05;
    positions[i*3+1] += (targets[i*3+1]-positions[i*3+1])*0.05;
    positions[i*3+2] += (targets[i*3+2]-positions[i*3+2])*0.05;
  }
  geometry.attributes.position.needsUpdate = true;
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
