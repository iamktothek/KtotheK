<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #n8n-link {
            position: absolute;
            bottom: 15%; /* Pinned relative to screen height */
            padding: 12px 30px;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 3px;
            opacity: 0; 
            transition: all 0.4s ease;
            pointer-events: auto;
            cursor: pointer;
        }

        #n8n-link:hover {
            background: #000;
            color: #fff;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <a href="https://n8n.ktothek.com" id="n8n-link">N8N</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, points;
        let mouseX = 0, mouseY = 0;
        let targetRotationX = 0, targetRotationY = 0;
        const particleCount = 15000;
        const positions = new Float32Array(particleCount * 3);
        const targets = new Float32Array(particleCount * 3);

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Initial random scatter
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 30;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 30;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 15;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                size: 0.03,
                color: 0x000000,
                transparent: true,
                opacity: 0.8
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            generateTextTargets();

            // Assemble Animation
            gsap.to(positions, {
                endArray: targets,
                duration: 4,
                ease: "power4.out",
                onUpdate: () => { points.geometry.attributes.position.needsUpdate = true; },
                onComplete: () => {
                    gsap.to("#n8n-link", { opacity: 1, duration: 1 });
                }
            });

            // Listeners for Mouse and Touch
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('touchmove', onTouchMove);
            window.addEventListener('resize', onWindowResize);
        }

        function generateTextTargets() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1600;
            canvas.height = 400;

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Adjust font size based on screen width
            const fontSize = window.innerWidth < 600 ? 180 : 220;
            ctx.fillStyle = 'black';
            ctx.font = `900 ${fontSize}px sans-serif`; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText("K TO THE K", canvas.width / 2, canvas.height / 2);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const coords = [];

            // Scale factor to fit text to screen width
            const scale = Math.min(window.innerWidth / 1400, 1) * 0.012;

            for (let y = 0; y < canvas.height; y += 2) {
                for (let x = 0; x < canvas.width; x += 2) {
                    const i = (y * canvas.width + x) * 4;
                    if (imageData[i] < 128) {
                        coords.push({
                            x: (x - canvas.width / 2) * scale,
                            y: (canvas.height / 2 - y) * scale
                        });
                    }
                }
            }

            for (let i = 0; i < particleCount; i++) {
                const target = coords[i % coords.length];
                targets[i * 3] = target.x;
                targets[i * 3 + 1] = target.y;
                targets[i * 3 + 2] = (Math.random() - 0.5) * 0.2; 
            }
        }

        function onMouseMove(event) {
            // Convert mouse position to a range of -1 to 1
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Set target rotation (limited to ~25 degrees)
            targetRotationY = mouseX * 0.4;
            targetRotationX = mouseY * 0.4;
        }

        function onTouchMove(event) {
            if (event.touches.length > 0) {
                mouseX = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouseY = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
                targetRotationY = mouseX * 0.4;
                targetRotationX = mouseY * 0.4;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            generateTextTargets(); // Recalculate to keep it fitting the width
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Smoothly interpolate rotation for a premium "heavy" feel (Lerp)
            points.rotation.y += (targetRotationY - points.rotation.y) * 0.05;
            points.rotation.x += (targetRotationX - points.rotation.x) * 0.05;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
