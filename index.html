<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f7f9;
            --text-color: #000000;
            --glitch-cyan: #00f2ff;
            --glitch-magenta: #ff00c1;
            --scanline-color: rgba(0, 0, 0, 0.2);
        }

        /* --- THE MECHANICAL SHUTTER --- */
        #loader-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .shutter {
            flex: 1;
            background: #000;
            width: 100%;
            transition: transform 1.2s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* Top shutter slides UP, Bottom slides DOWN */
        .loaded #shutter-top { transform: translateY(-100%); }
        .loaded #shutter-bottom { transform: translateY(100%); }

        /* The CRT Power Line */
        .loader-beam {
            position: absolute;
            top: 50%; left: 0;
            width: 0%; height: 2px;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            z-index: 10000;
            transform: translateY(-50%);
            animation: beamExpand 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes beamExpand {
            0% { width: 0%; opacity: 0; }
            100% { width: 100%; opacity: 1; }
        }

        /* Hide beam when shutters open */
        .loaded .loader-beam { opacity: 0; transition: opacity 0.3s; }

        /* --- VHS EFFECTS --- */
        .vhs-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 4px 100%;
            z-index: 40;
            pointer-events: none;
            opacity: 0.25;
            animation: vhs-flicker 0.1s infinite;
        }

        @keyframes vhs-flicker {
            0% { opacity: 0.2; }
            50% { opacity: 0.28; }
            100% { opacity: 0.24; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }

        /* --- THE HEAVY SCANLINE --- */
        #scanline {
            position: absolute;
            top: -30px; left: 0; width: 100%; height: 40px;
            background: var(--scanline-color);
            z-index: 20; pointer-events: none;
            box-shadow: 0 0 25px rgba(0,0,0,0.1);
        }

        .container { text-align: center; z-index: 5; }

        .glitch-text {
            font-weight: 900; text-transform: uppercase;
            letter-spacing: -0.02em; display: flex;
            justify-content: center; align-items: center;
            gap: 0.1em; user-select: none;
        }
        .char { position: relative; display: inline-block; font-size: clamp(3rem, 10vw, 8rem); }
        .char.big-k { font-size: clamp(6rem, 20vw, 16rem); line-height: 0.8; }

        /* --- GLITCH --- */
        .char::before, .char::after {
            content: attr(data-char);
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            visibility: hidden; background: transparent;
        }
        .char.active::before, .char:hover::before {
            visibility: visible; left: 6px; color: var(--glitch-cyan); z-index: -1;
            animation: glitch-anim 0.25s infinite linear alternate-reverse;
            animation-delay: var(--g-delay);
        }
        .char.active::after, .char:hover::after {
            visibility: visible; left: -6px; color: var(--glitch-magenta); z-index: -2;
            animation: glitch-anim-2 0.3s infinite linear alternate;
            animation-delay: calc(var(--g-delay) * 0.5);
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(-3px, 2px); }
            100% { clip-path: inset(30% 0 20% 0); transform: translate(3px, -2px); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(30% 0 30% 0); transform: translate(3px, 2px); }
            100% { clip-path: inset(10% 0 70% 0); transform: translate(-3px, -2px); }
        }

        /* --- AGGRESSIVE BUTTON PUSH --- */
        .button-wrapper { 
            margin-top: 5rem; 
            position: relative; 
            display: inline-block;
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }

        /* Aggressive squash and drop */
        .button-wrapper.active {
            transform: translateY(40px) scaleY(0.85) scaleX(1.05);
            transition: transform 0.1s ease-out; 
        }

        .n8n-link {
            display: inline-block; text-decoration: none;
            color: var(--text-color); font-weight: 900;
            font-size: 0.85rem; letter-spacing: 0.4em;
            padding: 22px 65px; border: 3px solid var(--text-color);
            background: var(--bg-color); cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }

        .button-wrapper:hover .n8n-link {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-beam"></div>
        <div class="shutter" id="shutter-top"></div>
        <div class="shutter" id="shutter-bottom"></div>
    </div>

    <div class="vhs-overlay"></div>
    <div id="scanline"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-text" id="glitch-container"></div>
        <div class="button-wrapper" id="n8n-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
        </div>
    </div>

    <script>
        const text = "K TO THE K";
        const container = document.getElementById('glitch-container');
        const buttonWrapper = document.getElementById('n8n-wrapper');
        const loaderWrapper = document.getElementById('loader-wrapper');
        const chars = [];

        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char';
            if (char.toUpperCase() === 'K') span.classList.add('big-k');
            const randomDelay = (Math.random() * -1).toFixed(2) + 's';
            const randomSpeed = (0.2 + Math.random() * 0.1).toFixed(2) + 's';
            span.style.setProperty('--g-delay', randomDelay);
            span.style.setProperty('--g-speed', randomSpeed);
            span.innerText = char === ' ' ? '\u00A0' : char;
            span.setAttribute('data-char', char);
            container.appendChild(span);
            chars.push(span);
        });

        const interactableObjects = [...chars, buttonWrapper];
        let scanPos = -200;
        const speed = 2.5; 

        function animateScan() {
            scanPos += speed;
            if (scanPos > window.innerHeight + 200) scanPos = -200;
            const scanline = document.getElementById('scanline');
            if(scanline) scanline.style.top = scanPos + 'px';

            interactableObjects.forEach(obj => {
                const rect = obj.getBoundingClientRect();
                if (scanPos > rect.top && scanPos < rect.bottom) {
                    obj.classList.add('active');
                } else {
                    obj.classList.remove('active');
                }
            });
            requestAnimationFrame(animateScan);
        }

        animateScan();

        // Mechanical Reveal Logic
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                loaderWrapper.classList.add('loaded');
            }, 1200); // Give the beam time to span the width
        });
    </script>
</body>
</html>
