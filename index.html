<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #ffffff; 
            cursor: default; 
            touch-action: none;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, points;
        let mouse = new THREE.Vector2(-100, -100); // Start off-screen
        let targetRotation = new THREE.Vector2();
        let raycaster = new THREE.Raycaster();
        let worldMouse = new THREE.Vector3();
        
        const particleCount = 5000; 
        const positions = new Float32Array(particleCount * 3);
        const targets = new Float32Array(particleCount * 3);
        const isButtonFlag = new Uint8Array(particleCount); // 1 if button, 0 if text

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 18;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Initial chaotic positions
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 50;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 50;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                size: 0.12, 
                color: 0x000000,
                transparent: true,
                opacity: 0.9
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            generateMaps();

            // Initial Assembly
            gsap.to(positions, {
                endArray: targets,
                duration: 4,
                ease: "expo.out",
                onUpdate: () => { points.geometry.attributes.position.needsUpdate = true; }
            });

            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', (e) => onMove(e.touches[0]));
            window.addEventListener('click', onClick);
            window.addEventListener('resize', onResize);
        }

        function generateMaps() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 2000;
            canvas.height = 1000;
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const vWidth = 2 * Math.tan((camera.fov * Math.PI) / 360) * camera.position.z * camera.aspect;
            const scale = (vWidth * 0.6) / canvas.width;

            // DRAW TITLE
            ctx.fillStyle = 'black';
            ctx.font = '900 180px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("K TO THE K", canvas.width / 2, 400);

            // DRAW BUTTON
            ctx.fillRect(canvas.width / 2 - 220, 600, 440, 160);
            ctx.fillStyle = 'white';
            ctx.font = '700 90px sans-serif';
            ctx.fillText("N8N", canvas.width / 2, 710);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const pts = [];

            for (let y = 0; y < canvas.height; y += 5) {
                for (let x = 0; x < canvas.width; x += 5) {
                    const i = (y * canvas.width + x) * 4;
                    if (imgData[i] < 200) {
                        pts.push({
                            x: (x - canvas.width / 2) * scale,
                            y: (canvas.height / 2 - y) * scale,
                            isBtn: (y > 500)
                        });
                    }
                }
            }

            for (let i = 0; i < particleCount; i++) {
                let p = pts[i % pts.length];
                targets[i * 3] = p.x;
                targets[i * 3 + 1] = p.y;
                targets[i * 3 + 2] = 0;
                isButtonFlag[i] = p.isBtn ? 1 : 0;
            }
        }

        function onMove(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            targetRotation.y = mouse.x * 0.3;
            targetRotation.x = -mouse.y * 0.3;

            // Update virtual interaction point
            worldMouse.set(mouse.x, mouse.y, 0).unproject(camera);
            worldMouse.sub(camera.position).normalize();
            let dist = -camera.position.z / worldMouse.z;
            worldMouse.copy(camera.position).add(worldMouse.multiplyScalar(dist));

            // Check button hover
            const over = (mouse.y < -0.15 && mouse.y > -0.55 && Math.abs(mouse.x) < 0.2);
            if (over !== isOverButton) {
                isOverButton = over;
                document.body.style.cursor = isOverButton ? 'pointer' : 'default';
            }
        }

        let isOverButton = false;

        function onClick() { if (isOverButton) window.location.href = "https://n8n.ktothek.com"; }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            points.rotation.y += (targetRotation.y - points.rotation.y) * 0.05;
            points.rotation.x += (targetRotation.x - points.rotation.x) * 0.05;

            const pos = points.geometry.attributes.position.array;
            
            // To calculate repulsion correctly while the logo is tilted, 
            // we must account for the object's rotation.
            const matrix = new THREE.Matrix4().makeRotationFromEuler(points.rotation);
            const invMatrix = new THREE.Matrix4().copy(matrix).invert();
            let localMouse = worldMouse.clone().applyMatrix4(invMatrix);

            for(let i = 0; i < particleCount; i++) {
                let tx = targets[i * 3];
                let ty = targets[i * 3 + 1];
                let tz = targets[i * 3 + 2];

                // 1. Repulsion (Text Only)
                if (isButtonFlag[i] === 0) {
                    const dx = tx - localMouse.x;
                    const dy = ty - localMouse.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq < 4.0) { // Distance threshold
                        const dist = Math.sqrt(distSq);
                        const force = (2.0 - dist) / 2.0;
                        tx += (dx / dist) * force * 1.5;
                        ty += (dy / dist) * force * 1.5;
                        tz += force * 2.0;
                    }
                }

                // 2. Glitch (Button Only)
                if (isOverButton && isButtonFlag[i] === 1) {
                    tx += (Math.random() - 0.5) * 0.3;
                    ty += (Math.random() - 0.5) * 0.3;
                }

                // 3. Smooth Interpolation
                pos[i * 3] += (tx - pos[i * 3]) * 0.1;
                pos[i * 3 + 1] += (ty - pos[i * 3 + 1]) * 0.1;
                pos[i * 3 + 2] += (tz - pos[i * 3 + 2]) * 0.1;
            }
            
            points.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
