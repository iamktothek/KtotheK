<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f7f9;
            --text-color: #000000;
            --glitch-cyan: #00f2ff;
            --glitch-magenta: #ff00c1;
            --vcr-green: #2aff2a;
        }

        /* --- THE MECHANICAL SHUTTER --- */
        #loader-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; display: flex; flex-direction: column;
            pointer-events: none; overflow: hidden;
        }
        .shutter {
            flex: 1; background: #000; width: 100%; position: relative;
            transition: transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .shutter::after {
            content: ""; position: absolute; left: 0; width: 100%; height: 2px;
            background: #fff; box-shadow: 0 0 15px #fff; opacity: 0;
        }
        #shutter-top::after { bottom: 0; }
        #shutter-bottom::after { top: 0; }
        .power-on .shutter::after { opacity: 1; transition: opacity 0.1s; }
        .loaded #shutter-top { transform: translateY(-100%); }
        .loaded #shutter-bottom { transform: translateY(100%); }

        /* --- VHS EFFECTS --- */
        .vhs-grain {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            z-index: 50; pointer-events: none;
            background-image: repeating-radial-gradient(#000 0 0.0001%, #fff 0 0.0002%);
            background-size: 100px 100px; opacity: 0.05;
            animation: grain-flicker 0.15s steps(2) infinite;
        }
        @keyframes grain-flicker {
            0% { transform: translate(0,0); }
            100% { transform: translate(5px,5px); }
        }

        /* --- VCR STATUS OVERLAY --- */
        #vcr-status {
            position: fixed; top: 40px; left: 50px;
            color: var(--vcr-green); font-family: monospace;
            font-size: 1.5rem; text-transform: uppercase;
            z-index: 60; opacity: 0.8; letter-spacing: 2px;
            text-shadow: 2px 0 0 rgba(255,0,0,0.5);
        }
        .vcr-blink { animation: vcr-blink-anim 1s steps(2) infinite; }
        @keyframes vcr-blink-anim { 0% { opacity: 0.8; } 50% { opacity: 0.2; } }

        /* --- GLOBAL LAYOUT --- */
        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Inter', sans-serif; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative; margin: 0;
        }
        .container { text-align: center; z-index: 5; }

        /* --- TYPOGRAPHY & STABLE GLITCH --- */
        .glitch-text {
            font-weight: 900; text-transform: uppercase;
            display: flex; justify-content: center; align-items: center;
            gap: 0.05em; user-select: none;
            filter: drop-shadow(2px 0 0px rgba(0, 242, 255, 0.15)) 
                    drop-shadow(-2px 0 0px rgba(255, 0, 193, 0.15));
        }
        .char { 
            position: relative; 
            display: inline-block; 
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 1;
        }
        .char.big-k { font-size: clamp(6rem, 20vw, 16rem); }

        .char::before, .char::after {
            content: attr(data-char);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg-color);
            visibility: hidden;
        }
        
        .char.active::before {
            visibility: visible; left: 4px;
            color: var(--glitch-cyan); z-index: -1;
            animation: glitch-anim 0.2s infinite;
        }
        .char.active::after {
            visibility: visible; left: -4px;
            color: var(--glitch-magenta); z-index: -2;
            animation: glitch-anim-2 0.2s infinite linear;
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(20% 0 50% 0); transform: translate(-3px, 1px); }
            50% { clip-path: inset(40% 0 10% 0); transform: translate(3px, -1px); }
            100% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 2px); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(60% 0 10% 0); transform: translate(3px, -2px); }
            50% { clip-path: inset(10% 0 40% 0); transform: translate(-3px, 1px); }
            100% { clip-path: inset(30% 0 30% 0); transform: translate(2px, -1px); }
        }

        /* --- BUTTON & SLOW SCALE HOVER --- */
        .button-wrapper { margin-top: 4rem; }
        .n8n-link {
            display: inline-block; text-decoration: none;
            color: var(--text-color); font-weight: 900; font-size: 0.85rem;
            letter-spacing: 0.4em; padding: 22px 65px; border: 3px solid var(--text-color);
            background: var(--bg-color); position: relative;
            /* Transition set to 0.8s for a slow, steady increase */
            transition: transform 0.8s ease-in-out, background 0.4s ease, color 0.4s ease, letter-spacing 0.8s ease-in-out, box-shadow 0.8s ease;
            transform-origin: center;
        }
        
        .n8n-link:hover { 
            background: var(--text-color); 
            color: var(--bg-color);
            transform: scale(2.0); /* Twice as large */
            letter-spacing: 0.6em;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }
    </style>
</head>
<body>

    <div id="vcr-status">
        <span class="vcr-blink">PLAY ▶</span><br>
        <span id="vcr-timer">00:00:01</span>
    </div>

    <div id="loader-wrapper">
        <div class="shutter" id="shutter-top"></div>
        <div class="shutter" id="shutter-bottom"></div>
    </div>

    <div class="vhs-grain"></div>
    <div class="bg-grid"></div>

    <div class="container">
        <div class="glitch-text" id="glitch-container"></div>
        <div class="button-wrapper">
            <a href="https://n8n.ktothek.com" class="n8n-link">N8N</a>
        </div>
    </div>

    <script>
        const text = "K TO THE K";
        const glitchContainer = document.getElementById('glitch-container');
        const timerElement = document.getElementById('vcr-timer');
        const chars = [];

        // 1. Build Text
        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char';
            if (char.toUpperCase() === 'K') span.classList.add('big-k');
            const displayChar = char === ' ' ? '\u00A0' : char;
            span.innerText = displayChar;
            span.setAttribute('data-char', displayChar);
            glitchContainer.appendChild(span);
            chars.push(span);
        });

        // 2. VCR Timer Logic
        let totalSeconds = 1; // Start at 1
        function updateTimer() {
            totalSeconds++;
            const hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            const mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const secs = String(totalSeconds % 60).padStart(2, '0');
            timerElement.innerText = `${hrs}:${mins}:${secs}`;
        }
        setInterval(updateTimer, 1000);

        // 3. Random Glitch Logic
        function triggerGlitchCascade() {
            const indices = Array.from({ length: chars.length }, (_, i) => i);
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }

            indices.forEach((charIndex, i) => {
                const char = chars[charIndex];
                if (char.innerText.trim() === "") return;
                const startDelay = i * (Math.random() * 70); 
                setTimeout(() => {
                    char.classList.add('active');
                    const duration = 150 + Math.random() * 250;
                    setTimeout(() => char.classList.remove('active'), duration);
                }, startDelay);
            });
        }

        window.addEventListener('load', () => {
            document.body.classList.add('power-on');
            setTimeout(() => {
                document.getElementById('loader-wrapper').classList.add('loaded');
                setInterval(triggerGlitchCascade, 3000);
            }, 800);
        });
    </script>
</body>
</html>
