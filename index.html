<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K | Landing</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; font-family: sans-serif; }
        canvas { display: block; }
        
        /* Overlay for the clickable link */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Let clicks pass through to canvas if needed */
        }

        #n8n-link {
            margin-top: 120px; /* Adjust based on text size */
            padding: 10px 25px;
            border: 2px solid black;
            background: transparent;
            color: black;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            opacity: 0; /* Start hidden */
            transition: background 0.3s, color 0.3s;
            pointer-events: auto; /* Re-enable clicks */
            cursor: pointer;
        }

        #n8n-link:hover {
            background: black;
            color: white;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <a href="https://n8n.ktothek.com" id="n8n-link">N8N</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, particles;
        const particleCount = 8000;
        const posArray = new Float32Array(particleCount * 3);
        const targetArray = new Float32Array(particleCount * 3);

        init();
        animate();

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. Create Initial Scattered Particles
            for(let i = 0; i < particleCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 20; // Scattered everywhere
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

            const material = new THREE.PointsMaterial({
                size: 0.02,
                color: 0x000000,
                transparent: true,
                opacity: 0.8
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // 3. Generate Target Positions from Text
            generateTextTargets();

            // 4. Animate Assembly
            gsap.to(posArray, {
                endArray: targetArray,
                duration: 3,
                ease: "power3.inOut",
                onUpdate: () => {
                    particles.geometry.attributes.position.needsUpdate = true;
                },
                onComplete: () => {
                    // Fade in the button after text forms
                    gsap.to("#n8n-link", { opacity: 1, duration: 1 });
                }
            });
        }

        function generateTextTargets() {
            // We use a 2D canvas to "draw" the text, then sample pixel locations
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1000;
            canvas.height = 200;
            
            ctx.fillStyle = 'black';
            ctx.font = 'Bold 120px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('K TO THE K', 500, 120);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const points = [];

            // Sample pixels that are black (text)
            for (let y = 0; y < canvas.height; y += 2) {
                for (let x = 0; x < canvas.width; x += 2) {
                    const alpha = imageData[(y * canvas.width + x) * 4 + 3];
                    if (alpha > 128) {
                        points.push({
                            x: (x - 500) * 0.015,
                            y: (100 - y) * 0.015
                        });
                    }
                }
            }

            // Map target positions to the particles
            for (let i = 0; i < particleCount; i++) {
                const p = points[i % points.length];
                targetArray[i * 3] = p.x + (Math.random() - 0.5) * 0.1;
                targetArray[i * 3 + 1] = p.y + (Math.random() - 0.5) * 0.1;
                targetArray[i * 3 + 2] = 0;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Subtle floating movement
            particles.rotation.y += 0.001;
            particles.rotation.x += 0.0005;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
