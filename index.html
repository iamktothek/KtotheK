<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
        canvas { display: block; cursor: default; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, time = 0;
        
        let particles = [];
        const mouse = { x: -1000, y: -1000 };
        let isOverButton = false;

        class Particle {
            constructor(tx, ty, isBtn) {
                // Spawn randomly within the view
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                
                this.tx = tx;
                this.ty = ty;
                this.isBtn = isBtn;
                
                // Variable size for the "dust" look
                this.size = Math.random() * (isBtn ? 1.5 : 2.5) + 0.5;
                
                // Physics constants
                this.ease = 0.04 + Math.random() * 0.03; // Faster return
                this.vx = 0;
                this.vy = 0;
                
                // Individual "whispy" offsets
                this.noiseOffset = Math.random() * 100;
            }

            update() {
                // 1. Whispy / Floating Motion (The "Life" effect)
                const floatingX = Math.sin(time + this.noiseOffset) * 1.5;
                const floatingY = Math.cos(time * 0.8 + this.noiseOffset) * 1.5;

                let targetX = this.tx + floatingX;
                let targetY = this.ty + floatingY;

                // 2. High-Impact Magnetic Propulsion
                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const distSq = dx * dx + dy * dy;
                const radius = 3500; // Size of the magnetic field

                if (distSq < radius) {
                    const dist = Math.sqrt(distSq);
                    const force = (radius - distSq) / radius;
                    // Push them away fast
                    targetX += (dx / dist) * force * 60; 
                    targetY += (dy / dist) * force * 60;
                }

                // 3. Button Glitch
                if (this.isBtn && isOverButton) {
                    targetX += (Math.random() - 0.5) * 8;
                    targetY += (Math.random() - 0.5) * 8;
                }

                // 4. Movement Calculation
                this.x += (targetX - this.x) * this.ease;
                this.y += (targetY - this.y) * this.ease;
            }

            draw() {
                ctx.fillStyle = 'black';
                // Optimization: Use rects for small dust, circles only for larger grains
                if (this.size < 1.5) {
                    ctx.fillRect(this.x, this.y, this.size, this.size);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function init() {
            resize();
            const tCvs = document.createElement('canvas');
            const tCtx = tCvs.getContext('2d');
            tCvs.width = 1600; tCvs.height = 800; // Slightly smaller buffer

            tCtx.fillStyle = 'white'; tCtx.fillRect(0, 0, 1600, 800);
            tCtx.fillStyle = 'black';
            tCtx.font = '900 180px system-ui, -apple-system, sans-serif'; 
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.fillText("K to the K", 800, 300);

            // Pill Button
            const bW = 380, bH = 120, bX = 800 - bW/2, bY = 500;
            tCtx.beginPath();
            tCtx.roundRect(bX, bY, bW, bH, 60);
            tCtx.fill();

            tCtx.fillStyle = 'white';
            tCtx.font = 'bold 60px system-ui, sans-serif'; 
            tCtx.fillText("N8N", 800, bY + bH/2 + 4);

            const img = tCtx.getImageData(0, 0, 1600, 800).data;
            const points = [];
            
            // Moderate Density with Jitter for organic feel
            const step = 5; 
            for (let y = 0; y < 800; y += step) {
                for (let x = 0; x < 1600; x += step) {
                    if (img[(y * 1600 + x) * 4] < 128) {
                        points.push({
                            x: x + (Math.random() - 0.5) * 3,
                            y: y + (Math.random() - 0.5) * 3,
                            isBtn: y > 420
                        });
                    }
                }
            }

            const scale = (width * 0.75) / 1600; 
            const ox = (width - (1600 * scale)) / 2;
            const oy = (height - (800 * scale)) / 2;

            particles = points.map(p => new Particle(p.x * scale + ox, p.y * scale + oy, p.isBtn));
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            time += 0.02;
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            const sc = (width * 0.75) / 1600;
            const bCY = (560 * sc) + (height - (800 * sc)) / 2;
            const bW = 380 * sc, bH = 120 * sc;
            isOverButton = (mouse.x > width/2 - bW/2 && mouse.x < width/2 + bW/2 && mouse.y > bCY - bH/2 && mouse.y < bCY + bH/2);
            canvas.style.cursor = isOverButton ? 'pointer' : 'default';
        });

        window.addEventListener('click', () => { if (isOverButton) window.location.href = "https://n8n.ktothek.com"; });
        window.addEventListener('resize', () => { resize(); init(); });

        init(); animate();
    </script>
</body>
</html>
