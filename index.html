<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, points;
        let mouse = new THREE.Vector2();
        let targetRotation = new THREE.Vector2();
        
        const particleCount = 20000;
        const positions = new Float32Array(particleCount * 3);
        const targets = new Float32Array(particleCount * 3);

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            // Using a wider FOV to ensure 3D space feels roomy
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. Initial Chaotic Scatter
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 50;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 50;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 20;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                size: 0.035,
                color: 0x000000,
                transparent: true,
                opacity: 0.9
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            // 2. Generate the "K to the K" and "N8N" map
            generateCombinedMap();

            // 3. Assemble Animation
            gsap.to(positions, {
                endArray: targets,
                duration: 4,
                delay: 0.5,
                ease: "expo.out",
                onUpdate: () => { points.geometry.attributes.position.needsUpdate = true; }
            });

            // Input Listeners
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                // Tilt the logo slightly based on mouse
                targetRotation.y = mouse.x * 0.4;
                targetRotation.x = -mouse.y * 0.4;
            });

            window.addEventListener('click', () => {
                // Raycaster logic to check if clicking the bottom particle area
                if (mouse.y < -0.2 && mouse.y > -0.6 && Math.abs(mouse.x) < 0.2) {
                    window.location.href = "https://n8n.ktothek.com";
                }
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function generateCombinedMap() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Large virtual canvas for sharp sampling
            canvas.width = 2000;
            canvas.height = 1000;

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'black';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Draw MAIN TITLE (Top half)
            ctx.font = '900 220px sans-serif';
            ctx.fillText("K TO THE K", canvas.width / 2, canvas.height * 0.4);

            // Draw N8N (Bottom half) - this is now pure particles
            ctx.font = '700 100px sans-serif';
            ctx.fillText("N8N", canvas.width / 2, canvas.height * 0.7);
            
            // Optional: A small particle border for the button
            ctx.lineWidth = 5;
            ctx.strokeRect(canvas.width/2 - 150, canvas.height * 0.7 - 70, 300, 140);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const coords = [];

            // This scale factor ensures the text fills ~70% of the screen width
            const vWidth = 2 * Math.tan((camera.fov * Math.PI) / 360) * camera.position.z * camera.aspect;
            const scale = (vWidth * 0.7) / canvas.width;

            for (let y = 0; y < canvas.height; y += 3) {
                for (let x = 0; x < canvas.width; x += 3) {
                    const i = (y * canvas.width + x) * 4;
                    if (imageData[i] < 128) {
                        coords.push({
                            x: (x - canvas.width / 2) * scale,
                            y: (canvas.height / 2 - y) * scale
                        });
                    }
                }
            }

            // Distribute particles to targets
            for (let i = 0; i < particleCount; i++) {
                const target = coords[i % coords.length];
                targets[i * 3] = target.x;
                targets[i * 3 + 1] = target.y;
                targets[i * 3 + 2] = (Math.random() - 0.5) * 0.2; 
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Smoothly move toward mouse target, but don't auto-spin
            points.rotation.y += (targetRotation.y - points.rotation.y) * 0.05;
            points.rotation.x += (targetRotation.x - points.rotation.x) * 0.05;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
