<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>K to the K</title>
                <style>
                        * {
                                    margin: 0;
                                                padding: 0;
                                                            box-sizing: border-box;
                                                                        font-family: 'Arial', sans-serif;
                                                                                }
                                                                                        body {
                                                                                                    overflow: hidden;
                                                                                                                background: #000;
                                                                                                                            color: #fff;
                                                                                                                                        height: 100vh;
                                                                                                                                                    display: flex;
                                                                                                                                                                justify-content: center;
                                                                                                                                                                            align-items: center;
                                                                                                                                                                                        flex-direction: column;
                                                                                                                                                                                                }
                                                                                                                                                                                                        #title {
                                                                                                                                                                                                                    font-size: clamp(3rem, 8vw, 8rem);
                                                                                                                                                                                                                                font-weight: 700;
                                                                                                                                                                                                                                            margin-bottom: 2rem;
                                                                                                                                                                                                                                                        opacity: 0;
                                                                                                                                                                                                                                                                    animation: fadeIn 2s ease-in forwards;
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                    #n8n-btn {
                                                                                                                                                                                                                                                                                                padding: 1rem 2rem;
                                                                                                                                                                                                                                                                                                            font-size: 1.2rem;
                                                                                                                                                                                                                                                                                                                        background: #fff;
                                                                                                                                                                                                                                                                                                                                    color: #000;
                                                                                                                                                                                                                                                                                                                                                border: none;
                                                                                                                                                                                                                                                                                                                                                            border-radius: 4px;
                                                                                                                                                                                                                                                                                                                                                                        cursor: pointer;
                                                                                                                                                                                                                                                                                                                                                                                    text-decoration: none;
                                                                                                                                                                                                                                                                                                                                                                                                transition: all 0.3s;
                                                                                                                                                                                                                                                                                                                                                                                                            opacity: 0;
                                                                                                                                                                                                                                                                                                                                                                                                                        animation: fadeIn 2s 0.5s ease-in forwards;
                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                        #n8n-btn:hover {
                                                                                                                                                                                                                                                                                                                                                                                                                                                    background: #ccc;
                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    @keyframes fadeIn {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                from { opacity: 0; transform: translateY(20px); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            to { opacity: 1; transform: translateY(0); }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            canvas {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        position: fixed;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    top: 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                left: 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            width: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        height: 100%;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    z-index: -1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h1 id="title">K to the K</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <a id="n8n-btn" href="https://n8n.ktothek.com">n8n</a>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script src="script.js"></script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
