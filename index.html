<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ffffff; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #n8n-link {
            margin-top: 180px; /* Pushed down to clear the 3D text */
            padding: 12px 30px;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            opacity: 0; 
            transition: all 0.4s ease;
            pointer-events: auto;
            cursor: pointer;
        }

        #n8n-link:hover {
            background: #000;
            color: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <a href="https://n8n.ktothek.com" id="n8n-link">N8N</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        let scene, camera, renderer, points;
        const particleCount = 12000; // Increased density
        
        // We'll use these to animate
        const positions = new Float32Array(particleCount * 3);
        const targets = new Float32Array(particleCount * 3);

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff); // White Background

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 8; // Pulled back slightly so text isn't cut off

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 1. Initialize particles in random scattered positions
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 25;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 25;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            // Black particles
            const material = new THREE.PointsMaterial({
                size: 0.035,
                color: 0x000000, 
                transparent: true,
                opacity: 0.9
            });

            points = new THREE.Points(geometry, material);
            scene.add(points);

            // 2. Generate the "K to the K" map
            const textCoords = getTextImageData("K TO THE K");
            
            for (let i = 0; i < particleCount; i++) {
                const target = textCoords[i % textCoords.length];
                targets[i * 3] = target.x;
                targets[i * 3 + 1] = target.y;
                targets[i * 3 + 2] = (Math.random() - 0.5) * 0.5; // Slight depth
            }

            // 3. The "Assembly" Animation
            gsap.to(positions, {
                endArray: targets,
                duration: 3.5,
                ease: "expo.out",
                onUpdate: () => {
                    points.geometry.attributes.position.needsUpdate = true;
                },
                onComplete: () => {
                    gsap.to("#n8n-link", { opacity: 1, duration: 1.5 });
                }
            });
        }

        function getTextImageData(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1200;
            canvas.height = 400;

            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = 'black';
            // Using a system font that is heavy for better particle density
            ctx.font = '900 160px sans-serif'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const coords = [];

            for (let y = 0; y < canvas.height; y += 2) {
                for (let x = 0; x < canvas.width; x += 2) {
                    const i = (y * canvas.width + x) * 4;
                    // If the pixel is dark, add a coordinate
                    if (imageData[i] < 128) {
                        coords.push({
                            x: (x - canvas.width / 2) * 0.012,
                            y: (canvas.height / 2 - y) * 0.012
                        });
                    }
                }
            }
            return coords;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Subtle breathing movement
            const time = Date.now() * 0.0005;
            points.rotation.y = Math.sin(time) * 0.05;
            points.rotation.x = Math.cos(time) * 0.03;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
