<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K to the K</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;}
body{height:100vh;background:#050510;font-family:'Orbitron',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center;color:white;}
canvas{position:fixed;top:0;left:0;z-index:1;}
.container{position:relative;z-index:5;text-align:center;padding:60px 80px;background:rgba(10,10,30,0.35);backdrop-filter:blur(18px);border-radius:20px;box-shadow:0 0 50px rgba(0,234,255,0.25),0 0 120px rgba(255,0,247,0.25);}
.title{font-size:clamp(3rem,8vw,6rem);letter-spacing:.25em;background:linear-gradient(90deg,#00f2ff,#ff00ea,#00f2ff);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glowPulse 3s ease-in-out infinite,gradientMove 6s linear infinite;}
.divider{width:160px;height:2px;margin:30px auto;background:linear-gradient(90deg,transparent,#00eaff,transparent);box-shadow:0 0 10px #00eaff;}
.button{display:inline-block;padding:16px 42px;font-size:1.2rem;letter-spacing:.25em;color:#00eaff;text-decoration:none;border:2px solid #00eaff;border-radius:8px;animation:glowPulse 3s ease-in-out infinite;}
.button:hover{box-shadow:0 0 15px #00eaff,0 0 40px #ff00f7,0 0 80px #ff00f7;color:white;}
@keyframes glowPulse{0%,100%{text-shadow:0 0 10px #00eaff,0 0 20px #ff00f7;box-shadow:0 0 10px #00eaff,0 0 20px #ff00f7;}50%{text-shadow:0 0 20px #00eaff,0 0 40px #ff00f7;box-shadow:0 0 20px #00eaff,0 0 40px #ff00f7;}}
@keyframes gradientMove{0%{background-position:0%}100%{background-position:200%}}
</style>
</head>
<body>
<div class="container">
  <div class="title">K to the K</div>
  <div class="divider"></div>
  <a class="button" href="https://n8n.ktothek.com">N8N</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 25;
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x050510);
document.body.appendChild(renderer.domElement);

/* PARTICLES */
const particleCount=1200;
const geometry=new THREE.BufferGeometry();
const positions=new Float32Array(particleCount*3);
const targets=new Float32Array(particleCount*3);
const velocities=new Float32Array(particleCount*3);

/* random initial positions */
for(let i=0;i<particleCount;i++){
positions[i*3]=(Math.random()-0.5)*40;
positions[i*3+1]=(Math.random()-0.5)*40;
positions[i*3+2]=(Math.random()-0.5)*40;
}

/* generate target positions from text */
const textCanvas=document.createElement("canvas");
textCanvas.width=1000;
textCanvas.height=300;
const ctx=textCanvas.getContext("2d");
ctx.fillStyle="white";
ctx.font="bold 180px Orbitron";
ctx.textAlign="center";
ctx.fillText("K to the K",500,180);
const data=ctx.getImageData(0,0,1000,300).data;
let index=0;
for(let y=0;y<300;y+=4){
for(let x=0;x<1000;x+=4){
let i=(y*1000+x)*4;
if(data[i]>150 && index<particleCount){
targets[index*3]=(x-500)/25;
targets[index*3+1]=(150-y)/25;
targets[index*3+2]=0;
index++;
}
}
}

/* particle texture */
const canvas=document.createElement("canvas");
canvas.width=64;
canvas.height=64;
const g=canvas.getContext("2d");
const grad=g.createRadialGradient(32,32,2,32,32,32);
grad.addColorStop(0,"#ffffff");
grad.addColorStop(0.3,"#00eaff");
grad.addColorStop(0.7,"#ff00f7");
grad.addColorStop(1,"transparent");
g.fillStyle=grad;
g.fillRect(0,0,64,64);
const texture=new THREE.CanvasTexture(canvas);

const material=new THREE.PointsMaterial({size:.25,map:texture,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
geometry.setAttribute("position",new THREE.BufferAttribute(positions,3));
const particles=new THREE.Points(geometry,material);
scene.add(particles);

/* line connections */
const lineMaterial=new THREE.LineBasicMaterial({color:0xff00f7,transparent:true,opacity:0.25});
const lineGeometry=new THREE.BufferGeometry();
const linePositions=new Float32Array(particleCount*particleCount*3);
const lines=new THREE.LineSegments(lineGeometry,lineMaterial);
scene.add(lines);

/* cyberpunk grid */
const grid=new THREE.GridHelper(200,80,0xff00f7,0x00eaff);
grid.position.y=-12;
scene.add(grid);

/* pointer */
let mouseX=0,mouseY=0;
function updatePointer(x,y){mouseX=(x/window.innerWidth-0.5)*2;mouseY=(y/window.innerHeight-0.5)*2;}
window.addEventListener("mousemove",e=>updatePointer(e.clientX,e.clientY));
window.addEventListener("touchmove",e=>updatePointer(e.touches[0].clientX,e.touches[0].clientY));
window.addEventListener("deviceorientation",e=>{mouseX=e.gamma/30;mouseY=e.beta/60;});

/* shockwave */
let shockwave=0;
window.addEventListener("click",()=>shockwave=2);

/* animate */
let morphProgress=0,morphComplete=false;
function animate(){
requestAnimationFrame(animate);
const pos=geometry.attributes.position.array;

/* morph to logo */
if(!morphComplete){
morphProgress+=0.02;
for(let i=0;i<particleCount;i++){
pos[i*3]+=(targets[i*3]-pos[i*3])*0.05;
pos[i*3+1]+=(targets[i*3+1]-pos[i*3+1])*0.05;
pos[i*3+2]+=(targets[i*3+2]-pos[i*3+2])*0.05;
}
if(morphProgress>1)morphComplete=true;
}else{
/* floating motion */
for(let i=0;i<particleCount;i++){
pos[i*3]+=Math.sin(i+performance.now()*0.0005)*0.002;
pos[i*3+1]+=Math.cos(i+performance.now()*0.0005)*0.002;
}
}

/* apply shockwave */
if(shockwave>0){
particles.scale.set(1+shockwave,1+shockwave,1+shockwave);
shockwave*=0.9;
}else particles.scale.set(1,1,1);

/* rotation parallax */
particles.rotation.y+=0.0006+mouseX*0.004;
particles.rotation.x+=0.0004+mouseY*0.004;

geometry.attributes.position.needsUpdate=true;

/* line connections */
const linePos=linePositions;
let lp=0;
for(let i=0;i<particleCount;i++){
for(let j=i+1;j<particleCount;j++){
let dx=pos[i*3]-pos[j*3];
let dy=pos[i*3+1]-pos[j*3+1];
let dz=pos[i*3+2]-pos[j*3+2];
let d=Math.sqrt(dx*dx+dy*dy+dz*dz);
if(d<1.5){
linePos[lp++]=pos[i*3];linePos[lp++]=pos[i*3+1];linePos[lp++]=pos[i*3+2];
linePos[lp++]=pos[j*3];linePos[lp++]=pos[j*3+1];linePos[lp++]=pos[j*3+2];
}
}
}
lineGeometry.setDrawRange(0,lp);
lineGeometry.attributes.position=new THREE.BufferAttribute(linePos,3);
lineGeometry.attributes.position.needsUpdate=true;

renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
