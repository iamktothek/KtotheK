<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K to the K</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
}

body{
height:100vh;
background:#050510;
font-family:'Orbitron',sans-serif;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:1;
}

.container{
position:relative;
z-index:2;
text-align:center;
}

.title{
font-size:clamp(3rem,8vw,6rem);
letter-spacing:.25em;

background:linear-gradient(90deg,#00f2ff,#ff00ea,#00f2ff);
background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
glowPulse 3s ease-in-out infinite,
gradientMove 6s linear infinite;
}

.divider{
width:160px;
height:2px;
margin:30px auto;
background:linear-gradient(90deg,transparent,#00eaff,transparent);
box-shadow:0 0 10px #00eaff;
}

.button{
display:inline-block;
padding:16px 42px;
font-size:1.2rem;
letter-spacing:.25em;

color:#00eaff;
text-decoration:none;

border:2px solid #00eaff;
border-radius:8px;

animation:glowPulse 3s ease-in-out infinite;
}

.button:hover{
box-shadow:
0 0 10px #00eaff,
0 0 30px #ff00f7,
0 0 60px #ff00f7;

color:white;
}

@keyframes glowPulse{
0%,100%{
text-shadow:
0 0 10px #00eaff,
0 0 20px #ff00f7;

box-shadow:
0 0 10px #00eaff,
0 0 20px #ff00f7;
}
50%{
text-shadow:
0 0 20px #00eaff,
0 0 40px #ff00f7;

box-shadow:
0 0 20px #00eaff,
0 0 40px #ff00f7;
}
}

@keyframes gradientMove{
0%{background-position:0%}
100%{background-position:200%}
}

</style>

</head>

<body>

<div class="container">

<div class="title">K to the K</div>

<div class="divider"></div>

<a class="button" href="https://n8n.ktothek.com">N8N</a>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 10

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setPixelRatio(window.devicePixelRatio)
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setClearColor(0x050510)

document.body.appendChild(renderer.domElement)

const particleCount = 400
const maxDistance = 1.5

const geometry = new THREE.BufferGeometry()
const positions = []
const velocities = []

for(let i=0;i<particleCount;i++){

let x=(Math.random()-0.5)*10
let y=(Math.random()-0.5)*10
let z=(Math.random()-0.5)*10

positions.push(x,y,z)

velocities.push(
(Math.random()-0.5)*0.01,
(Math.random()-0.5)*0.01,
(Math.random()-0.5)*0.01
)

}

geometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(positions,3)
)

const material = new THREE.PointsMaterial({
color:0x00eaff,
size:0.08,
transparent:true,
blending:THREE.AdditiveBlending
})

const particles = new THREE.Points(geometry,material)
scene.add(particles)

let mouseX=0
let mouseY=0

function updatePointer(x,y){

mouseX=(x/window.innerWidth-0.5)*2
mouseY=(y/window.innerHeight-0.5)*2

}

window.addEventListener("mousemove",e=>{
updatePointer(e.clientX,e.clientY)
})

window.addEventListener("touchmove",e=>{
updatePointer(e.touches[0].clientX,e.touches[0].clientY)
})

window.addEventListener("deviceorientation",e=>{
mouseX = e.gamma/30
mouseY = e.beta/60
})

const lineMaterial = new THREE.LineBasicMaterial({
color:0xff00f7,
transparent:true,
opacity:0.3
})

let shockwave = 0

window.addEventListener("click",()=>{
shockwave = 2
})

function animate(){

requestAnimationFrame(animate)

const pos = geometry.attributes.position.array

for(let i=0;i<particleCount;i++){

pos[i*3]+=velocities[i*3]
pos[i*3+1]+=velocities[i*3+1]
pos[i*3+2]+=velocities[i*3+2]

}

geometry.attributes.position.needsUpdate = true

particles.rotation.y +=0.0005 + mouseX*0.003
particles.rotation.x +=0.0002 + mouseY*0.003

if(shockwave>0){

particles.scale.set(
1+shockwave,
1+shockwave,
1+shockwave
)

shockwave*=0.9

}

renderer.render(scene,camera)

}

animate()

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
