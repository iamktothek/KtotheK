<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K to the K</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
user-select:none;
-webkit-user-select:none;
}

body{
height:100vh;
background:#050510;
font-family:'Orbitron',sans-serif;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:1;
}

.container{

position:relative;
z-index:2;
text-align:center;

/* glass background for readability */

padding:60px 80px;

background:rgba(10,10,30,0.35);

backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);

border-radius:20px;

box-shadow:
0 0 30px rgba(0,234,255,0.2),
0 0 60px rgba(255,0,247,0.2);

}

.title{

font-size:clamp(3rem,8vw,6rem);
letter-spacing:.25em;

background:linear-gradient(90deg,#00f2ff,#ff00ea,#00f2ff);
background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:
glowPulse 3s ease-in-out infinite,
gradientMove 6s linear infinite;

}

.divider{
width:160px;
height:2px;
margin:30px auto;

background:linear-gradient(90deg,transparent,#00eaff,transparent);

box-shadow:0 0 10px #00eaff;
}

.button{

display:inline-block;
padding:16px 42px;
font-size:1.2rem;
letter-spacing:.25em;

color:#00eaff;
text-decoration:none;

border:2px solid #00eaff;
border-radius:8px;

animation:glowPulse 3s ease-in-out infinite;

}

.button:hover{

box-shadow:
0 0 15px #00eaff,
0 0 35px #ff00f7,
0 0 80px #ff00f7;

color:white;

}

@keyframes glowPulse{

0%,100%{

text-shadow:
0 0 10px #00eaff,
0 0 20px #ff00f7;

box-shadow:
0 0 10px #00eaff,
0 0 20px #ff00f7;

}

50%{

text-shadow:
0 0 20px #00eaff,
0 0 40px #ff00f7;

box-shadow:
0 0 20px #00eaff,
0 0 40px #ff00f7;

}

}

@keyframes gradientMove{
0%{background-position:0%}
100%{background-position:200%}
}

</style>

</head>

<body>

<div class="container">

<div class="title">K to the K</div>

<div class="divider"></div>

<a class="button" href="https://n8n.ktothek.com">N8N</a>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z = 10

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setPixelRatio(window.devicePixelRatio)
renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setClearColor(0x050510)

document.body.appendChild(renderer.domElement)

const particleCount = 500

const geometry = new THREE.BufferGeometry()

const positions = new Float32Array(particleCount*3)
const colors = new Float32Array(particleCount*3)

const colorA = new THREE.Color("#00eaff")
const colorB = new THREE.Color("#ff00f7")

for(let i=0;i<particleCount;i++){

let x=(Math.random()-0.5)*12
let y=(Math.random()-0.5)*12
let z=(Math.random()-0.5)*12

positions[i*3]=x
positions[i*3+1]=y
positions[i*3+2]=z

let mix = Math.random()

let color = colorA.clone().lerp(colorB,mix)

colors[i*3]=color.r
colors[i*3+1]=color.g
colors[i*3+2]=color.b

}

geometry.setAttribute(
'position',
new THREE.BufferAttribute(positions,3)
)

geometry.setAttribute(
'color',
new THREE.BufferAttribute(colors,3)
)

/* circular particle texture */

const canvas = document.createElement('canvas')
canvas.width = 64
canvas.height = 64

const ctx = canvas.getContext('2d')

const gradient = ctx.createRadialGradient(
32,32,2,
32,32,32
)

gradient.addColorStop(0,"white")
gradient.addColorStop(0.2,"white")
gradient.addColorStop(0.4,"rgba(255,255,255,0.6)")
gradient.addColorStop(1,"rgba(255,255,255,0)")

ctx.fillStyle = gradient
ctx.fillRect(0,0,64,64)

const texture = new THREE.CanvasTexture(canvas)

const material = new THREE.PointsMaterial({

size:0.15,
map:texture,
vertexColors:true,
transparent:true,
depthWrite:false,
blending:THREE.AdditiveBlending

})

const particles = new THREE.Points(geometry,material)

scene.add(particles)

let mouseX=0
let mouseY=0

function updatePointer(x,y){

mouseX=(x/window.innerWidth-0.5)*2
mouseY=(y/window.innerHeight-0.5)*2

}

window.addEventListener("mousemove",e=>{
updatePointer(e.clientX,e.clientY)
})

window.addEventListener("touchmove",e=>{
updatePointer(e.touches[0].clientX,e.touches[0].clientY)
})

function animate(){

requestAnimationFrame(animate)

particles.rotation.y +=0.0006 + mouseX*0.003
particles.rotation.x +=0.0003 + mouseY*0.003

renderer.render(scene,camera)

}

animate()

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
