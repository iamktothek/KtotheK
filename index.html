<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* White Background */
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .n8n-button {
            margin-top: 320px; 
            pointer-events: auto;
            padding: 16px 45px;
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.8);
            color: black;
            text-decoration: none;
            letter-spacing: 0.4em;
            font-weight: 900;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .n8n-button:hover {
            background: black;
            color: white;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <a href="https://n8n.ktothek.com" class="n8n-button">N8N</a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        let scene, camera, renderer, textMesh;
        const mouse = { x: 0, y: 0 };

        init();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            // Enable better reflections
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 1. LIGHTING (Essential for Chrome)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const topLight = new THREE.DirectionalLight(0xffffff, 2);
            topLight.position.set(0, 10, 10);
            scene.add(topLight);

            // Add a point light that follows the mouse for "sparkle"
            const pointLight = new THREE.PointLight(0xffffff, 100);
            scene.add(pointLight);

            // 2. PROCEDURAL ENVIRONMENT MAP
            // This creates a "sky" for the chrome to reflect so it isn't black
            const genCubeUrls = ( prefix, postfix ) => {
                return [
                    prefix + 'px' + postfix, prefix + 'nx' + postfix,
                    prefix + 'py' + postfix, prefix + 'ny' + postfix,
                    prefix + 'pz' + postfix, prefix + 'nz' + postfix
                ];
            };

            // 3. LOAD FONT & CREATE INFLATED TEXT
            const fontLoader = new FontLoader();
            fontLoader.load('https://unpkg.com/three@0.160.0/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                
                const geometry = new TextGeometry('K to the K', {
                    font: font,
                    size: 6,
                    height: 1,
                    curveSegments: 32,
                    bevelEnabled: true,
                    bevelThickness: 2.5, // High value for balloon puffiness
                    bevelSize: 1.5,
                    bevelOffset: 0,
                    bevelSegments: 20
                });
                geometry.center();

                const material = new THREE.MeshPhysicalMaterial({
                    color: 0xeeeeee,      // Base silver
                    metalness: 1.0,       // Full metal
                    roughness: 0.02,      // High gloss
                    reflectivity: 1,
                    clearcoat: 1.0,       // Extra shiny layer
                    clearcoatRoughness: 0.02
                });

                textMesh = new THREE.Mesh(geometry, material);
                scene.add(textMesh);
                animate();
            });

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                
                // Move light with mouse to create dynamic chrome reflections
                pointLight.position.x = mouse.x * 20;
                pointLight.position.y = mouse.y * 20;
                pointLight.position.z = 20;
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (textMesh) {
                // Smoothly follow mouse rotation
                textMesh.rotation.y += (mouse.x * 0.3 - textMesh.rotation.y) * 0.05;
                textMesh.rotation.x += (-mouse.y * 0.3 - textMesh.rotation.x) * 0.05;

                // Balloon floating physics
                textMesh.position.y = Math.sin(time) * 1.0;
                
                // Inflation pulse
                const pulse = 1 + Math.sin(time * 1.5) * 0.02;
                textMesh.scale.set(pulse, pulse, pulse);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
