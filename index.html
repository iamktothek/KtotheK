<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K to the K</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            overflow: hidden;
            font-family: sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .n8n-button {
            margin-top: 280px; 
            pointer-events: auto;
            padding: 18px 45px;
            background: #000;
            color: #fff;
            text-decoration: none;
            letter-spacing: 0.3em;
            font-weight: bold;
            font-size: 14px;
            border-radius: 5px;
            transition: transform 0.2s ease;
        }

        .n8n-button:hover {
            transform: scale(1.05);
            background: #222;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <a href="https://n8n.ktothek.com" class="n8n-button">N8N</a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        let scene, camera, renderer, textMesh;
        const mouse = new THREE.Vector2();

        init();

        function init() {
            // 1. Scene & Camera
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // Critical for Chrome appearance
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.5;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 2. The Environment (The "Chrome" Maker)
            const environment = new RoomEnvironment(renderer);
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            scene.environment = pmremGenerator.fromScene(environment).texture;

            // 3. Lights
            const mainLight = new THREE.DirectionalLight(0xffffff, 2);
            mainLight.position.set(10, 10, 10);
            scene.add(mainLight);

            // 4. Load Font & Create Inflated Balloon Text
            const fontLoader = new FontLoader();
            // Using a reliable CDN font
            fontLoader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
                
                const geometry = new TextGeometry('K to the K', {
                    font: font,
                    size: 6,
                    height: 1,
                    curveSegments: 32,
                    bevelEnabled: true,
                    bevelThickness: 2.2, // Puffy inflation
                    bevelSize: 1.5,      // Rounded edges
                    bevelOffset: 0,
                    bevelSegments: 15
                });
                geometry.center();

                const material = new THREE.MeshPhysicalMaterial({
                    color: 0xffffff,
                    metalness: 1,
                    roughness: 0.05,
                    reflectivity: 1,
                    clearcoat: 1,
                    clearcoatRoughness: 0.05
                });

                textMesh = new THREE.Mesh(geometry, material);
                scene.add(textMesh);
                animate();
            });

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            });

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (textMesh) {
                // Interaction
                textMesh.rotation.y += (mouse.x * 0.5 - textMesh.rotation.y) * 0.05;
                textMesh.rotation.x += (-mouse.y * 0.5 - textMesh.rotation.x) * 0.05;

                // Balloon float
                textMesh.position.y = Math.sin(time) * 1.2;
                
                // Pulsing
                const s = 1 + Math.sin(time * 2) * 0.02;
                textMesh.scale.set(s, s, s);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
